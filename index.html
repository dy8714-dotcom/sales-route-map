<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>営業ルート最適化ナビ（プロ設定版）</title>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 380px; padding: 15px; overflow-y: auto; background: #fff; border-right: 1px solid #ddd; }
        #map { flex: 1; }
        @media (max-width: 768px) {
            #main-container { flex-direction: column; }
            #sidebar { width: 100%; height: 50%; order: 2; }
            #map { height: 50%; order: 1; }
        }
        .section-title { font-size: 0.85em; color: #7f8c8d; margin: 12px 0 5px; font-weight: bold; border-bottom: 1px solid #eee; }
        .input-group { margin-bottom: 8px; background: #fdfdfd; padding: 8px; border-radius: 6px; border: 1px solid #eee; display: flex; align-items: center; gap: 5px; }
        .input-group.special { background: #e8f4fd; border-color: #3498db; }
        .input-label { font-weight: bold; color: #2c3e50; width: 65px; font-size: 0.85em; flex-shrink: 0; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9em; min-width: 0; }
        button { cursor: pointer; padding: 8px; border: none; border-radius: 4px; transition: 0.2s; flex-shrink: 0; }
        .primary-btn { background: #3498db; color: white; width: 100%; font-weight: bold; margin-top: 10px; }
        .go-btn { background: #27ae60; color: white; width: 100%; font-size: 1.1em; font-weight: bold; margin-top: 15px; height: 50px; }
        .location-btn { background: #e67e22; color: white; font-size: 0.75em; font-weight: bold; }
        .search-btn { background: #f1c40f; color: #2c3e50; font-size: 0.8em; font-weight: bold; }
        .remove-btn { background: #e74c3c; color: white; padding: 5px 8px; }
        .option-group { background: #fff3cd; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 0.85em; display: flex; gap: 10px; border: 1px solid #ffeeba; }
        .info-panel { margin-top: 15px; padding: 12px; background: #fafafa; border-radius: 8px; border: 1px solid #ddd; }
        .leg-info { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .route-link { display: block; padding: 10px; margin-top: 5px; background: white; border: 2px solid #3498db; color: #3498db; text-decoration: none; border-radius: 6px; font-weight: bold; text-align: center; }
        .iw-link { display: inline-block; margin-top: 5px; color: #3498db; font-weight: bold; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<header>営業ルートナビ ＆ 高度検索設定</header>

<div id="main-container">
    <div id="sidebar">
        <div class="section-title">START</div>
        <div class="input-group special">
            <span class="input-label">現在地</span>
            <input type="text" id="start-point" class="address-input" placeholder="住所または施設名" onchange="saveData()">
            <button class="search-btn" onclick="openGMap('start-point')">🔍</button>
            <button id="gps-btn" class="location-btn" onclick="getCurrentLocation()">GPS取得</button>
        </div>

        <div class="section-title">WAYPOINTS (A, B, C...)</div>
        <div id="waypoint-inputs"></div>
        <button class="primary-btn" onclick="addWaypoint()">＋ 経由地を追加</button>

        <div class="section-title">GOAL</div>
        <div class="input-group special">
            <span class="input-label">目的地</span>
            <input type="text" id="end-point" class="address-input" placeholder="最後に行く場所" onchange="saveData()">
            <button class="search-btn" onclick="openGMap('end-point')">🔍</button>
        </div>

        <div class="option-group">
            <label><input type="checkbox" id="avoid-highways"> 高速を使わない</label>
            <label><input type="checkbox" id="avoid-tolls"> 有料道を使わない</label>
        </div>

        <button class="go-btn" onclick="calculateRoute()">ルートを表示 ＆ 駐車場検索</button>
        
        <div id="info" class="info-panel"></div>
    </div>
    <div id="map"></div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCIj6xwk9pkWn9YbiAymzFt04AG_XrmC40&libraries=places&callback=initMap" async defer></script>

<script>
    let map, directionsService, directionsRenderer, infoWindow;
    let customMarkers = [];

    function initMap() {
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ suppressMarkers: true });
        infoWindow = new google.maps.InfoWindow();
        map = new google.maps.Map(document.getElementById('map'), {
            zoom: 13, center: { lat: 35.1815, lng: 136.9066 }
        });
        directionsRenderer.setMap(map);
        loadSavedData();
    }

    function openGMap(id) {
        const val = document.getElementById(id).value;
        if (!val) return;
        window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(val)}`, '_blank');
    }

    function openGMapByElement(el) {
        const val = el.parentElement.querySelector('input').value;
        if (!val) return;
        window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(val)}`, '_blank');
    }

    function getCurrentLocation() {
        const btn = document.getElementById('gps-btn');
        if (!navigator.geolocation) {
            alert("お使いのブラウザはGPSに対応していません。");
            return;
        }
        btn.innerText = "取得中...";
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                const geocoder = new google.maps.Geocoder();
                geocoder.geocode({ location: latlng }, (results, status) => {
                    if (status === "OK" && results[0]) {
                        document.getElementById('start-point').value = results[0].formatted_address;
                        btn.innerText = "取得完了";
                        setTimeout(() => { btn.innerText = "GPS取得"; }, 2000);
                        saveData();
                    } else {
                        alert("住所の特定に失敗しました。");
                        btn.innerText = "GPS取得";
                    }
                });
            },
            (error) => {
                let msg = "GPS取得エラー: ";
                if (error.code === 1) msg += "位置情報の利用を許可してください。";
                else msg += "電波状況の良い場所で試してください。";
                alert(msg);
                btn.innerText = "GPS取得";
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    function addWaypoint(value = "") {
        const container = document.getElementById('waypoint-inputs');
        const div = document.createElement('div');
        div.className = 'input-group';
        div.innerHTML = `
            <span class="input-label"></span>
            <input type="text" class="waypoint-input address-input" placeholder="住所または施設名" value="${value}" onchange="saveData()">
            <button class="search-btn" onclick="openGMapByElement(this)">🔍</button>
            <button class="remove-btn" onclick="this.parentElement.remove(); reLabel(); saveData();">×</button>
        `;
        container.appendChild(div);
        reLabel();
    }

    function reLabel() {
        document.querySelectorAll('.waypoint-input').forEach((el, i) => {
            el.previousElementSibling.innerText = `地点 ${String.fromCharCode(65 + i)}`;
        });
    }

    function calculateRoute() {
        customMarkers.forEach(m => m.setMap(null));
        customMarkers = [];

        const start = document.getElementById('start-point').value;
        const end = document.getElementById('end-point').value;
        const avoidHighways = document.getElementById('avoid-highways').checked;
        const avoidTolls = document.getElementById('avoid-tolls').checked;
        const waypointInputs = document.querySelectorAll('.waypoint-input');
        const waypointValues = Array.from(waypointInputs).map(i => i.value).filter(v => v !== "");
        const waypoints = waypointValues.map(loc => ({ location: loc, stopover: true }));

        if (!start || !end) { alert("現在地と目的地を入力してください"); return; }

        directionsService.route({
            origin: start, destination: end, waypoints: waypoints,
            travelMode: google.maps.TravelMode.DRIVING,
            avoidHighways: avoidHighways,
            avoidTolls: avoidTolls,
            optimizeWaypoints: false
        }, (response, status) => {
            if (status === 'OK') {
                directionsRenderer.setDirections(response);
                const legs = response.routes[0].legs;

                createMarker(legs[0].start_location, "現", "#e74c3c", start);
                for (let i = 0; i < legs.length - 1; i++) {
                    const label = String.fromCharCode(65 + i);
                    createMarker(legs[i].end_location, label, "#3498db", waypointValues[i]);
                    searchParking(legs[i].end_location);
                }
                const finalPos = legs[legs.length - 1].end_location;
                createMarker(finalPos, "目", "#27ae60", end);
                searchParking(finalPos); 

                displayNavLinks(legs, start, end, waypointValues);
            } else { alert("ルート検索失敗: " + status); }
        });
    }

    function createMarker(position, label, color, address) {
        const marker = new google.maps.Marker({
            position: position, map: map,
            label: { text: label, color: "white", fontWeight: "bold" },
            icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: color, fillOpacity: 1, strokeColor: "white", strokeWeight: 2, scale: 15 }
        });
        marker.addListener('click', () => {
            const content = `<div><strong>地点: ${label}</strong><br>${address}<br><a class="iw-link" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}', '_blank')">Googleマップで調べる</a></div>`;
            infoWindow.setContent(content);
            infoWindow.open(map, marker);
        });
        customMarkers.push(marker);
    }

    function searchParking(pos) {
        const service = new google.maps.places.PlacesService(map);
        service.nearbySearch({ location: pos, radius: 500, type: ['parking'] }, (results, status) => {
            if (status === google.maps.places.PlacesServiceStatus.OK) {
                results.forEach(place => {
                    const pMarker = new google.maps.Marker({
                        map: map, position: place.geometry.location,
                        label: { text: "P", color: "white", fontSize: "10px" },
                        icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: "#34495e", fillOpacity: 0.8, scale: 8, strokeColor: "white" }
                    });
                    customMarkers.push(pMarker);
                });
            }
        });
    }

    function displayNavLinks(legs, start, end, waypointValues) {
        let html = "<strong>🗺️ 走行データ ＆ ナビ</strong><hr>";
        const allLabels = ["現", ...waypointValues.map((_, i) => String.fromCharCode(65 + i)), "目"];
        const allValues = [start, ...waypointValues, end];
        
        legs.forEach((leg, i) => {
            const navUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(allValues[i])}&destination=${encodeURIComponent(allValues[i+1])}&travelmode=driving`;
            html += `
                <div class="leg-info">
                    <div style="font-size:0.9em; font-weight:bold;">${allLabels[i]} → ${allLabels[i+1]}</div>
                    <div style="font-size:0.85em; color:#e67e22; font-weight:bold;">${leg.distance.text} (${leg.duration.text})</div>
                    <a href="${navUrl}" target="_blank" class="route-link">🚗 この区間をナビ</a>
                </div>
            `;
        });
        document.getElementById('info').innerHTML = html;
    }

    function saveData() {
        const data = {
            start: document.getElementById('start-point').value,
            end: document.getElementById('end-point').value,
            waypoints: Array.from(document.querySelectorAll('.waypoint-input')).map(i => i.value),
            highways: document.getElementById('avoid-highways').checked,
            tolls: document.getElementById('avoid-tolls').checked
        };
        localStorage.setItem('sales_route_v6', JSON.stringify(data));
    }

    function loadSavedData() {
        const saved = JSON.parse(localStorage.getItem('sales_route_v6') || "{}");
        document.getElementById('start-point').value = saved.start || "";
        document.getElementById('end-point').value = saved.end || "";
        document.getElementById('avoid-highways').checked = saved.highways || false;
        document.getElementById('avoid-tolls').checked = saved.tolls || false;
        if (saved.waypoints) saved.waypoints.forEach(v => addWaypoint(v));
        else addWaypoint();
    }
</script>
</body>
</html>
