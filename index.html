<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>営業ルート最適化ナビ（視認性強化版）</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 400px; padding: 15px; overflow-y: auto; background: #fff; border-right: 1px solid #ddd; }
        #map { flex: 1; }
        @media (max-width: 768px) {
            #main-container { flex-direction: column; }
            #sidebar { width: 100%; height: 50%; order: 2; }
            #map { height: 50%; order: 1; }
        }
        .section-title { font-size: 0.85em; color: #7f8c8d; margin: 12px 0 5px; font-weight: bold; border-bottom: 1px solid #eee; }
        .input-group { margin-bottom: 8px; background: #fdfdfd; padding: 8px; border-radius: 6px; border: 1px solid #eee; display: flex; align-items: center; gap: 4px; }
        .input-group.special { background: #e8f4fd; border-color: #3498db; }
        .input-label { font-weight: bold; color: #2c3e50; width: 65px; font-size: 0.85em; flex-shrink: 0; }
        input, select { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9em; min-width: 0; }
        button { cursor: pointer; padding: 8px; border: none; border-radius: 4px; transition: 0.2s; flex-shrink: 0; }
        .primary-btn { background: #3498db; color: white; width: 100%; font-weight: bold; margin-top: 10px; }
        .go-btn { background: #27ae60; color: white; width: 100%; font-size: 1.1em; font-weight: bold; margin-top: 15px; height: 50px; }
        .location-btn { background: #e67e22; color: white; font-size: 0.75em; font-weight: bold; }
        .search-btn { background: #f1c40f; color: #2c3e50; font-size: 0.8em; font-weight: bold; }
        .remove-btn { background: #e74c3c; color: white; padding: 5px 8px; }
        .option-group { background: #fff3cd; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 0.85em; border: 1px solid #ffeeba; }
        .total-summary { background: #2c3e50; color: #fff; padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; }
        .total-summary span { font-size: 1.4em; font-weight: bold; color: #f1c40f; }
        .info-panel { margin-top: 15px; padding: 12px; background: #fafafa; border-radius: 8px; border: 1px solid #ddd; }
        .leg-info { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .route-link { display: block; padding: 10px; margin-top: 5px; background: white; border: 2px solid #3498db; color: #3498db; text-decoration: none; border-radius: 6px; font-weight: bold; text-align: center; }

        .dist-label-box {
            position: absolute;
            background: #fff;
            color: #e74c3c;
            font-weight: bold;
            font-size: 13px;
            padding: 4px 10px;
            border: 2.5px solid #e74c3c;
            border-radius: 6px;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
            letter-spacing: 0.5px;
        }
        .dist-label-box::after {
            content: '';
            position: absolute;
            bottom: -7px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 7px solid #e74c3c;
        }

        .parking-status {
            font-size: 0.8em;
            color: #7f8c8d;
            text-align: center;
            margin-top: 6px;
            padding: 4px 8px;
            background: #f8f9fa;
            border-radius: 4px;
            display: none;
        }
        .parking-status.active { display: block; }

        /* ===== 住所読み取りパネル ===== */
        .reader-toggle-btn {
            background: linear-gradient(135deg, #8e44ad, #9b59b6);
            color: white;
            width: 100%;
            font-weight: bold;
            font-size: 0.95em;
            margin-bottom: 10px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .reader-toggle-btn:hover { opacity: 0.9; }

        .reader-panel {
            display: none;
            background: #f5f0ff;
            border: 1.5px solid #d5c8f0;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            animation: panelSlide 0.3s ease;
        }
        .reader-panel.open { display: block; }
        @keyframes panelSlide {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reader-panel .tab-bar { display: flex; gap: 4px; margin-bottom: 10px; }
        .reader-panel .tab-btn {
            flex: 1; padding: 7px; font-size: 0.8em; font-weight: bold;
            border-radius: 4px; background: #e8e0f5; color: #6c5b7b; text-align: center;
        }
        .reader-panel .tab-btn.active { background: #8e44ad; color: white; }
        .reader-panel .tab-content { display: none; }
        .reader-panel .tab-content.active { display: block; }

        .reader-panel textarea {
            width: 100%; min-height: 80px; padding: 8px;
            border: 1px solid #d5c8f0; border-radius: 4px;
            font-size: 0.85em; resize: vertical; font-family: inherit;
        }

        .image-drop-zone {
            border: 2px dashed #c0a8e0; border-radius: 8px; padding: 20px;
            text-align: center; color: #8e44ad; font-size: 0.85em;
            cursor: pointer; transition: 0.2s; background: #faf7ff; position: relative;
        }
        .image-drop-zone:hover, .image-drop-zone.dragover { background: #ede3ff; border-color: #8e44ad; }
        .image-drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .image-preview { max-width: 100%; max-height: 120px; border-radius: 4px; margin-top: 8px; }

        .extract-btn {
            background: #8e44ad; color: white; width: 100%;
            font-weight: bold; margin-top: 8px; padding: 10px;
        }
        .extract-btn:disabled { background: #bbb; cursor: not-allowed; }

        .ocr-progress { margin-top: 8px; display: none; }
        .ocr-progress.active { display: block; }
        .ocr-progress-bar { height: 6px; background: #e8e0f5; border-radius: 3px; overflow: hidden; }
        .ocr-progress-fill {
            height: 100%; background: linear-gradient(90deg, #8e44ad, #e74c3c);
            border-radius: 3px; transition: width 0.3s; width: 0%;
        }
        .ocr-progress-text { font-size: 0.75em; color: #8e44ad; margin-top: 3px; text-align: center; }

        /* OCR認識テキスト表示 */
        .ocr-raw-toggle {
            font-size: 0.75em; color: #8e44ad; cursor: pointer;
            text-decoration: underline; margin-top: 6px; display: none; text-align: right;
        }
        .ocr-raw-toggle.active { display: block; }
        .ocr-raw-area {
            display: none; margin-top: 4px;
        }
        .ocr-raw-area.open { display: block; }
        .ocr-raw-area textarea {
            width: 100%; min-height: 120px; font-size: 0.78em;
            color: #333; background: #f9f7fd; border: 1px solid #e8e0f5;
        }
        .re-extract-btn {
            background: #6c5b7b; color: white; width: 100%;
            font-weight: bold; margin-top: 4px; padding: 8px; font-size: 0.85em;
        }

        /* 住所チップ */
        .address-results { margin-top: 10px; }
        .address-results-title { font-size: 0.8em; font-weight: bold; color: #6c5b7b; margin-bottom: 6px; }
        .address-chip {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 10px; margin-bottom: 5px;
            background: white; border: 1.5px solid #d5c8f0; border-radius: 6px;
            cursor: grab; font-size: 0.85em; transition: 0.2s; user-select: none;
        }
        .address-chip:hover { border-color: #8e44ad; box-shadow: 0 2px 6px rgba(142, 68, 173, 0.2); }
        .address-chip.selected { background: #8e44ad; color: white; border-color: #8e44ad; }
        .address-chip .chip-icon { font-size: 1em; flex-shrink: 0; }
        .address-chip .chip-text { flex: 1; min-width: 0; word-break: break-all; }
        .address-chip .chip-sub { font-size: 0.75em; color: #999; }
        .address-chip.selected .chip-sub { color: rgba(255,255,255,0.7); }
        .address-chip .chip-remove {
            background: none; border: none; color: #999;
            cursor: pointer; padding: 0 2px; font-size: 1.1em; flex-shrink: 0;
        }
        .address-chip.selected .chip-remove { color: rgba(255,255,255,0.7); }
        .address-chip.dragging { opacity: 0.5; }

        .address-input.drop-highlight {
            outline: 3px solid #8e44ad !important;
            outline-offset: -1px;
            background: #f5f0ff !important;
        }
        .chip-hint { font-size: 0.72em; color: #999; text-align: center; margin-top: 4px; }

        .url-input-row { display: flex; gap: 4px; margin-bottom: 6px; }
        .url-input-row input { flex: 1; font-size: 0.85em; }
        .url-fetch-btn {
            background: #8e44ad; color: white; font-size: 0.8em;
            font-weight: bold; white-space: nowrap; padding: 8px 12px;
        }

        #preprocess-canvas { display: none; }
    </style>
</head>
<body>

<header>営業ルートナビ（視認性強化版 v2）</header>

<div id="main-container">
    <div id="sidebar">
        <div id="total-display" class="total-summary" style="display:none;">
            総移動距離: <span id="total-km">0.0</span> km
        </div>

        <!-- ===== 住所読み取りパネル ===== -->
        <button class="reader-toggle-btn" onclick="toggleReaderPanel()">
            📷 住所読み取り（画像・テキスト）<span id="reader-arrow">▼</span>
        </button>
        <div id="reader-panel" class="reader-panel">
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchReaderTab('image', this)">📷 画像OCR</button>
                <button class="tab-btn" onclick="switchReaderTab('text', this)">📋 テキスト貼付</button>
                <button class="tab-btn" onclick="switchReaderTab('url', this)">🔗 URL読取</button>
            </div>

            <!-- 画像OCRタブ -->
            <div id="tab-image" class="tab-content active">
                <div class="image-drop-zone" id="image-drop-zone">
                    <input type="file" accept="image/*" id="ocr-file-input" onchange="handleImageSelect(event)">
                    <div id="image-drop-text">📷 画像をドラッグ＆ドロップ<br>またはクリックして選択</div>
                    <img id="image-preview" class="image-preview" style="display:none;">
                </div>
                <button class="extract-btn" id="ocr-extract-btn" onclick="runOCR()" disabled>🔍 住所を読み取る</button>
                <div class="ocr-progress" id="ocr-progress">
                    <div class="ocr-progress-bar"><div class="ocr-progress-fill" id="ocr-progress-fill"></div></div>
                    <div class="ocr-progress-text" id="ocr-progress-text">読み込み準備中...</div>
                </div>
                <!-- OCR認識テキスト表示（編集可能） -->
                <div class="ocr-raw-toggle" id="ocr-raw-toggle" onclick="toggleOCRRaw()">▶ 認識テキストを確認・編集</div>
                <div class="ocr-raw-area" id="ocr-raw-area">
                    <textarea id="ocr-raw-text" placeholder="OCR認識結果がここに表示されます"></textarea>
                    <button class="re-extract-btn" onclick="reExtractFromRaw()">🔄 編集テキストから再抽出</button>
                </div>
            </div>

            <!-- テキスト貼付タブ -->
            <div id="tab-text" class="tab-content">
                <textarea id="text-input" placeholder="住所を含むテキストをここに貼り付けてください。&#10;例: 愛知県名古屋市中区栄3-5-12&#10;    中村区亀島一丁目2番4号&#10;    中村区オオアキチョウ 4-65"></textarea>
                <button class="extract-btn" onclick="extractFromText()">🔍 住所を抽出する</button>
            </div>

            <!-- URL読取タブ -->
            <div id="tab-url" class="tab-content">
                <div class="url-input-row">
                    <input type="text" id="url-input" placeholder="https://example.com">
                    <button class="url-fetch-btn" onclick="fetchFromURL()">取得</button>
                </div>
                <div style="font-size:0.72em; color:#999; margin-bottom:6px;">※ CORS制限により一部サイトは取得できません</div>
                <textarea id="url-text-result" placeholder="取得結果がここに表示されます" readonly style="min-height:60px;"></textarea>
                <button class="extract-btn" onclick="extractFromURLText()">🔍 住所を抽出する</button>
            </div>

            <!-- 抽出結果 -->
            <div class="address-results" id="address-results" style="display:none;">
                <div class="address-results-title">📍 抽出された住所候補 <span id="address-count"></span></div>
                <div id="address-chips"></div>
                <div class="chip-hint">💡 PC: ドラッグ＆ドロップで入力欄へ ／ スマホ: タップで選択→入力欄をタップ</div>
            </div>
        </div>

        <!-- ===== START ===== -->
        <div class="section-title">START</div>
        <div class="input-group special">
            <span class="input-label">現在地</span>
            <input type="text" id="start-point" class="address-input" placeholder="住所または施設名" onchange="saveData()">
            <button class="remove-btn" onclick="clearValue('start-point')">×</button>
            <button class="search-btn" onclick="openGMap('start-point')">🔍</button>
            <button id="gps-btn" class="location-btn" onclick="getCurrentLocation()">GPS</button>
        </div>

        <div class="section-title">WAYPOINTS</div>
        <div id="waypoint-inputs"></div>
        <button class="primary-btn" onclick="addWaypoint()">＋ 経由地を追加</button>

        <div class="section-title">GOAL</div>
        <div class="input-group special">
            <span class="input-label">目的地</span>
            <input type="text" id="end-point" class="address-input" placeholder="最後に行く場所" onchange="saveData()">
            <button class="remove-btn" onclick="clearValue('end-point')">×</button>
            <button class="search-btn" onclick="openGMap('end-point')">🔍</button>
        </div>

        <div class="option-group">
            <div style="margin-bottom:8px; display:flex; align-items:center; gap:10px;">
                <span class="input-label" style="width:auto;">移動手段:</span>
                <select id="travel-mode" onchange="saveData()">
                    <option value="DRIVING">自動車</option>
                    <option value="WALKING">徒歩</option>
                    <option value="BICYCLING">自転車</option>
                    <option value="TRANSIT">電車・バス</option>
                </select>
            </div>
            <div>
                <label><input type="checkbox" id="avoid-highways" onchange="saveData()"> 高速回避</label>
                <label style="margin-left:10px;"><input type="checkbox" id="avoid-tolls" onchange="saveData()"> 有料道回避</label>
            </div>
        </div>

        <button class="go-btn" onclick="calculateRoute()">ルートを表示 ＆ 駐車場検索</button>
        <div class="parking-status" id="parking-status"></div>
        <div id="info" class="info-panel"></div>
    </div>
    <div id="map"></div>
</div>

<canvas id="preprocess-canvas"></canvas>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCIj6xwk9pkWn9YbiAymzFt04AG_XrmC40&libraries=places&callback=initMap" async defer></script>

<script>
    let map, directionsService, directionsRenderer, infoWindow;
    let customMarkers = [];
    let customOverlays = [];
    let selectedChipAddress = null;
    let DistanceLabelOverlay = null;

    /* ============================================
       初期化
       ============================================ */
    function initMap() {
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ suppressMarkers: true });
        infoWindow = new google.maps.InfoWindow();
        map = new google.maps.Map(document.getElementById('map'), {
            zoom: 13, center: { lat: 35.1815, lng: 136.9066 }
        });
        directionsRenderer.setMap(map);

        DistanceLabelOverlay = class extends google.maps.OverlayView {
            constructor(position, text) {
                super();
                this.position = position;
                this.text = text;
                this.div = null;
            }
            onAdd() {
                this.div = document.createElement('div');
                this.div.className = 'dist-label-box';
                this.div.textContent = this.text;
                this.getPanes().overlayLayer.appendChild(this.div);
            }
            draw() {
                const projection = this.getProjection();
                if (!projection || !this.div) return;
                const pos = projection.fromLatLngToDivPixel(this.position);
                if (pos) { this.div.style.left = pos.x + 'px'; this.div.style.top = pos.y + 'px'; }
            }
            onRemove() {
                if (this.div && this.div.parentNode) { this.div.parentNode.removeChild(this.div); this.div = null; }
            }
        };

        loadSavedData();
        setupDropTargets();
    }

    function createDistanceLabel(position, text) {
        const overlay = new DistanceLabelOverlay(position, text);
        overlay.setMap(map);
        customOverlays.push(overlay);
    }

    /* ============================================
       基本操作
       ============================================ */
    function clearValue(id) { document.getElementById(id).value = ""; saveData(); }

    function openGMap(id) {
        const val = document.getElementById(id).value;
        if (val) window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(val)}`, '_blank');
    }

    function openGMapByElement(el) {
        const val = el.parentElement.querySelector('input').value;
        if (val) window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(val)}`, '_blank');
    }

    function getCurrentLocation() {
        const btn = document.getElementById('gps-btn');
        if (!navigator.geolocation) return;
        btn.innerText = "中...";
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                new google.maps.Geocoder().geocode({ location: { lat: pos.coords.latitude, lng: pos.coords.longitude } }, (results, status) => {
                    if (status === "OK" && results[0]) { document.getElementById('start-point').value = results[0].formatted_address; saveData(); }
                    btn.innerText = "GPS";
                });
            },
            () => { btn.innerText = "GPS"; },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    function addWaypoint(value = "") {
        const container = document.getElementById('waypoint-inputs');
        const div = document.createElement('div');
        div.className = 'input-group';
        div.innerHTML = `
            <span class="input-label"></span>
            <input type="text" class="waypoint-input address-input" placeholder="住所または施設名" value="${value}" onchange="saveData()">
            <button class="search-btn" onclick="openGMapByElement(this)">🔍</button>
            <button class="remove-btn" onclick="this.parentElement.remove(); reLabel(); saveData();">×</button>
        `;
        container.appendChild(div);
        reLabel();
        setupDropTargets();
    }

    function reLabel() {
        document.querySelectorAll('.waypoint-input').forEach((el, i) => {
            el.previousElementSibling.innerText = `地点 ${String.fromCharCode(65 + i)}`;
        });
    }

    /* ============================================
       ルート計算
       ============================================ */
    function calculateRoute() {
        customMarkers.forEach(m => m.setMap(null)); customMarkers = [];
        customOverlays.forEach(o => o.setMap(null)); customOverlays = [];

        const start = document.getElementById('start-point').value;
        const end = document.getElementById('end-point').value;
        const mode = document.getElementById('travel-mode').value;
        const avoidHighways = document.getElementById('avoid-highways').checked;
        const avoidTolls = document.getElementById('avoid-tolls').checked;
        const waypointValues = Array.from(document.querySelectorAll('.waypoint-input')).map(i => i.value).filter(v => v !== "");

        if (mode === "TRANSIT" && waypointValues.length > 0) {
            alert("電車モードはシステム制限により一括での経由表示ができません。個別ナビをご利用ください。");
        }
        if (!start || !end) return;

        updateParkingStatus("searching");
        let parkingTotal = 0, parkingSearchesRemaining = 0;

        directionsService.route({
            origin: start, destination: end,
            waypoints: mode === "TRANSIT" ? [] : waypointValues.map(loc => ({ location: loc, stopover: true })),
            travelMode: google.maps.TravelMode[mode],
            avoidHighways, avoidTolls, optimizeWaypoints: false
        }, (response, status) => {
            if (status === 'OK') {
                directionsRenderer.setDirections(response);
                const legs = response.routes[0].legs;
                let totalMeters = 0;

                createMarker(legs[0].start_location, "現", "#e74c3c", start);

                legs.forEach((leg, i) => {
                    totalMeters += leg.distance.value;
                    const midIndex = Math.floor(leg.steps.length / 2);
                    createDistanceLabel(leg.steps[midIndex].start_location, leg.distance.text);

                    if (i < legs.length - 1) {
                        createMarker(leg.end_location, String.fromCharCode(65 + i), "#3498db", waypointValues[i]);
                        parkingSearchesRemaining++;
                        searchParking(leg.end_location, (c) => { parkingTotal += c; if (--parkingSearchesRemaining === 0) updateParkingStatus("done", parkingTotal); });
                    }
                });

                createMarker(legs[legs.length - 1].end_location, "目", "#27ae60", end);
                parkingSearchesRemaining++;
                searchParking(legs[legs.length - 1].end_location, (c) => { parkingTotal += c; if (--parkingSearchesRemaining === 0) updateParkingStatus("done", parkingTotal); });

                document.getElementById('total-display').style.display = 'block';
                document.getElementById('total-km').innerText = (totalMeters / 1000).toFixed(1);
                displayNavLinks(legs, start, end, waypointValues, mode);
            } else { alert("ルート計算に失敗しました: " + status); }
        });
    }

    function createMarker(position, label, color, address) {
        const marker = new google.maps.Marker({
            position, map,
            label: { text: label, color: "white", fontWeight: "bold" },
            icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: color, fillOpacity: 1, strokeColor: "white", strokeWeight: 2, scale: 15 }
        });
        marker.addListener('click', () => {
            infoWindow.setContent(`<div><strong>地点: ${label}</strong><br>${address}<br><a style="color:#3498db;cursor:pointer;text-decoration:underline;" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}', '_blank')">Googleマップで表示</a></div>`);
            infoWindow.open(map, marker);
        });
        customMarkers.push(marker);
    }

    /* ============================================
       駐車場検索
       ============================================ */
    function updateParkingStatus(state, count) {
        const el = document.getElementById('parking-status');
        el.classList.add('active');
        if (state === "searching") { el.innerHTML = "🔍 駐車場を検索中..."; el.style.color = "#e67e22"; }
        else if (state === "done") {
            el.innerHTML = count > 0 ? `🅿️ ${count}件の駐車場が見つかりました` : "⚠️ 付近に駐車場が見つかりませんでした";
            el.style.color = count > 0 ? "#27ae60" : "#e74c3c";
            setTimeout(() => { el.style.color = "#7f8c8d"; }, 3000);
        }
    }

    function searchParking(pos, callback) {
        const service = new google.maps.places.PlacesService(map);
        let foundCount = 0;
        service.nearbySearch({ location: pos, radius: 500, type: 'parking' }, (r1, s1) => {
            const first = (s1 === google.maps.places.PlacesServiceStatus.OK) ? r1 : [];
            foundCount += addParkingMarkers(first);
            service.nearbySearch({ location: pos, radius: 500, keyword: '駐車場 コインパーキング' }, (r2, s2) => {
                const second = (s2 === google.maps.places.PlacesServiceStatus.OK) ? r2 : [];
                const ids = new Set(first.map(r => r.place_id));
                foundCount += addParkingMarkers(second.filter(r => !ids.has(r.place_id)));
                if (callback) callback(foundCount);
            });
        });
    }

    function addParkingMarkers(results) {
        if (!results || !results.length) return 0;
        results.forEach(place => {
            const m = new google.maps.Marker({
                map, position: place.geometry.location,
                label: { text: "P", color: "white", fontSize: "10px", fontWeight: "bold" },
                icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: "#34495e", fillOpacity: 0.85, scale: 10, strokeColor: "white", strokeWeight: 1.5 }
            });
            m.addListener('click', () => {
                infoWindow.setContent(`<div><strong>🅿️ ${place.name}</strong><br>${place.vicinity || ''}<br>評価: ${place.rating ? place.rating + '⭐' : '---'}</div>`);
                infoWindow.open(map, m);
            });
            customMarkers.push(m);
        });
        return results.length;
    }

    function displayNavLinks(legs, start, end, waypointValues, mode) {
        const allLabels = ["現", ...waypointValues.map((_, i) => String.fromCharCode(65 + i)), "目"];
        const allValues = [start, ...waypointValues, end];
        const mapMode = { DRIVING: "driving", WALKING: "walking", BICYCLING: "bicycling", TRANSIT: "transit" }[mode];
        let html = "<strong>🗺️ ナビ・詳細データ</strong><hr>";
        legs.forEach((leg, i) => {
            const navUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(allValues[i])}&destination=${encodeURIComponent(allValues[i+1])}&travelmode=${mapMode}`;
            html += `<div class="leg-info"><div style="font-size:0.9em;font-weight:bold;">${allLabels[i]} → ${allLabels[i+1]}</div><div style="font-size:0.85em;color:#e67e22;font-weight:bold;">${leg.distance.text} (${leg.duration.text})</div><a href="${navUrl}" target="_blank" class="route-link">🚗 ナビ開始</a></div>`;
        });
        document.getElementById('info').innerHTML = html;
    }

    // --- 画像選択 & 前処理 ---
    let selectedImageData = null;

    function handleImageSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('image-preview').src = e.target.result;
            document.getElementById('image-preview').style.display = 'block';
            document.getElementById('image-drop-text').textContent = file.name;
            document.getElementById('ocr-extract-btn').disabled = false;
            preprocessImage(e.target.result);
        };
        reader.readAsDataURL(file);
    }

    document.addEventListener('DOMContentLoaded', () => {
        const zone = document.getElementById('image-drop-zone');
        if (!zone) return;
        zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
        zone.addEventListener('drop', (e) => {
            e.preventDefault(); zone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('image-preview').src = ev.target.result;
                    document.getElementById('image-preview').style.display = 'block';
                    document.getElementById('image-drop-text').textContent = file.name;
                    document.getElementById('ocr-extract-btn').disabled = false;
                    preprocessImage(ev.target.result);
                };
                reader.readAsDataURL(file);
            }
        });
    });

    // 画像前処理: グレースケール + コントラスト強化 + 2倍拡大
    function preprocessImage(dataURL) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('preprocess-canvas');
                const ctx = canvas.getContext('2d');
                const scale = Math.min(2, 4000 / Math.max(img.width, img.height));
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const d = imageData.data;
                for (let i = 0; i < d.length; i += 4) {
                    let gray = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
                    gray = ((gray - 128) * 1.6) + 128 + 10;
                    gray = Math.max(0, Math.min(255, gray));
                    // 二値化寄り: 閾値付近をはっきりさせる
                    if (gray > 180) gray = 255;
                    else if (gray < 80) gray = 0;
                    d[i] = d[i+1] = d[i+2] = gray;
                }
                ctx.putImageData(imageData, 0, 0);
                selectedImageData = canvas.toDataURL('image/png');
                resolve(selectedImageData);
            };
            img.src = dataURL;
        });
    }

    // --- Tesseract.js ---
    let tesseractLoaded = false;
    async function loadTesseract() {
        if (tesseractLoaded || window.Tesseract) { tesseractLoaded = true; return; }
        return new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js';
            s.onload = () => { tesseractLoaded = true; resolve(); };
            s.onerror = () => reject(new Error('Tesseract.js の読み込みに失敗'));
            document.head.appendChild(s);
        });
    }

    async function runOCR() {
        if (!selectedImageData) return;
        const progressEl = document.getElementById('ocr-progress');
        const fillEl = document.getElementById('ocr-progress-fill');
        const textEl = document.getElementById('ocr-progress-text');
        const btn = document.getElementById('ocr-extract-btn');

        btn.disabled = true;
        progressEl.classList.add('active');
        textEl.textContent = 'OCRエンジンを読み込み中...';
        fillEl.style.width = '10%';

        try {
            await loadTesseract();
            textEl.textContent = '日本語データを準備中...';
            fillEl.style.width = '20%';

            const worker = await Tesseract.createWorker({
                logger: (m) => {
                    if (m.status === 'recognizing text') {
                        fillEl.style.width = Math.round(25 + m.progress * 70) + '%';
                        textEl.textContent = `文字を認識中... ${Math.round(m.progress * 100)}%`;
                    } else if (m.status === 'loading language traineddata') {
                        fillEl.style.width = '18%';
                        textEl.textContent = '言語データをダウンロード中...';
                    }
                }
            });

            await worker.loadLanguage('jpn+eng');
            await worker.initialize('jpn+eng');
            // PSM 6: 統一ブロック（表形式に有効）
            await worker.setParameters({ tessedit_pageseg_mode: '6' });

            fillEl.style.width = '30%';
            textEl.textContent = '前処理済み画像を認識中...';

            const { data: { text } } = await worker.recognize(selectedImageData);
            await worker.terminate();

            fillEl.style.width = '100%';
            textEl.textContent = '完了！住所を抽出中...';

            // 認識テキストを表示（編集可能テキストエリア）
            document.getElementById('ocr-raw-text').value = text;
            document.getElementById('ocr-raw-toggle').classList.add('active');
            console.log('=== OCR認識テキスト ===\n' + text);

            const addresses = extractAddresses(text);
            displayAddressChips(addresses);

            // 結果が少ない場合、認識テキストを自動展開
            if (addresses.length === 0) {
                document.getElementById('ocr-raw-area').classList.add('open');
                document.getElementById('ocr-raw-toggle').textContent = '▼ 認識テキストを閉じる';
            }

            setTimeout(() => { progressEl.classList.remove('active'); btn.disabled = false; }, 1000);
        } catch (err) {
            textEl.textContent = 'エラー: ' + err.message;
            fillEl.style.width = '0%';
            btn.disabled = false;
        }
    }

    function toggleOCRRaw() {
        const area = document.getElementById('ocr-raw-area');
        area.classList.toggle('open');
        document.getElementById('ocr-raw-toggle').textContent =
            area.classList.contains('open') ? '▼ 認識テキストを閉じる' : '▶ 認識テキストを確認・編集';
    }

    function reExtractFromRaw() {
        const text = document.getElementById('ocr-raw-text').value;
        if (!text.trim()) return;
        displayAddressChips(extractAddresses(text));
    }

    function extractFromText() {
        const text = document.getElementById('text-input').value;
        if (!text.trim()) return;
        displayAddressChips(extractAddresses(text));
    }

    async function fetchFromURL() {
        const url = document.getElementById('url-input').value.trim();
        if (!url) return;
        const area = document.getElementById('url-text-result');
        area.value = '取得中...';
        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('取得失敗 (' + resp.status + ')');
            const html = await resp.text();
            const doc = new DOMParser().parseFromString(html, 'text/html');
            area.value = (doc.body ? doc.body.innerText : html).substring(0, 5000);
        } catch (err) {
            area.value = 'エラー: ' + err.message + '\n※ CORS制限によりテキスト貼付タブをご利用ください。';
        }
    }

    function extractFromURLText() {
        const text = document.getElementById('url-text-result').value;
        if (!text.trim()) return;
        displayAddressChips(extractAddresses(text));
    }

    /* ============================================
       住所抽出ロジック（大幅改良版）
       - 行単位解析 + キーワード近傍検索
       - カタカナ住所完全対応
       - OCRノイズ耐性強化
       ============================================ */
    function extractAddresses(rawText) {
        const results = [];

        // ===== テキスト正規化 =====
        let text = rawText;
        text = text.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
        text = text.replace(/[－ー―‐–—﹣−]/g, '-');
        text = text.replace(/　/g, ' ');
        // OCRで起きがちな置換
        text = text.replace(/[lI|]/g, (m, idx) => {
            const b = text[idx-1] || '', a = text[idx+1] || '';
            if (/\d/.test(b) || /\d/.test(a)) return '1';
            return m;
        });

        const lines = text.split(/[\n\r]+/);

        // ===== 建物情報を先に収集 =====
        const buildingByLine = {};
        lines.forEach((line, idx) => {
            const trimmed = line.trim();
            if (/建物|棟|号室/.test(trimmed)) {
                const bld = trimmed.replace(/^.*?(?:建物[^)）]*[)）]?\s*|号室\s*)/, '').trim();
                if (bld.length > 1 && !/^(?:あり|なし|特記)/.test(bld)) {
                    buildingByLine[idx] = bld;
                }
            }
        });

        // ===== 行ごとに解析 =====
        lines.forEach((line, lineIdx) => {
            const trimmed = line.trim();
            if (!trimmed || trimmed.length < 3) return;

            // --- (A) 「住所」「行政区」キーワード行 → 同一行の右側を抽出 ---
            if (/住所|行政区/.test(trimmed)) {
                // 「住所（行政区・町） 中村区亀島一丁目2番4号」
                let afterKW = trimmed;
                // ラベル部分を除去
                afterKW = afterKW.replace(/^.*?住所[^)）\s]*[)）]?\s*/, '');
                afterKW = afterKW.replace(/^.*?行政区[^)）\s]*[)）]?\s*/, '');
                afterKW = cleanAddr(afterKW);
                if (afterKW.length >= 4 && looksLikeAddress(afterKW)) {
                    addResult(results, afterKW, 'keyword', lineIdx, buildingByLine);
                }
            }

            // --- (B) 区名 + 漢字/カタカナ町名 + 番地 (柔軟パターン) ---
            const flexPatterns = [
                // 「XX区 YY 一丁目Z番W号」 or 「XX区 YY Z-W-V」
                /([^\s,、。]{1,5}区\s*[^\s,、。]{1,20}(?:\d{1,5}[-]\d{1,5}(?:[-]\d{1,5})?|\d{1,3}丁目[^\s,、。]{0,15}|[一二三四五六七八九十]+丁目[^\s,、。]{0,15}))/g,
                // 「XX区YY Z番W号」
                /([^\s,、。]{1,5}区[^\s,、。]{1,15}\d{1,5}番\d{0,5}号?)/g,
                // 「XX区 カタカナ 数字-数字」（スペース許容・カタカナ町名）
                /([^\s,、。]{1,5}区\s*[ァ-ヴー\s]{2,20}\s*\d{1,5}[-]?\d{0,5}[-]?\d{0,5})/g,
                // 「XX市XX区...」 から始まるフルパターン
                /([^\s,、。]{1,6}市[^\s,、。]{1,5}区\s*[^\s,、。]{1,20}(?:\d{1,5}[-]\d|丁目)[\s\S]{0,15})/g,
            ];

            flexPatterns.forEach(pat => {
                let m;
                while ((m = pat.exec(trimmed)) !== null) {
                    const addr = cleanAddr(m[1]);
                    if (addr.length >= 5 && looksLikeAddress(addr)) {
                        addResult(results, addr, 'pattern', lineIdx, buildingByLine);
                    }
                }
            });

            // --- (C) 都道府県始まり ---
            const prefPat = /((?:北海道|東京都|(?:京都|大阪)府|.{2,3}県)\s*[^\n,、。]{3,50})/g;
            let pm;
            while ((pm = prefPat.exec(trimmed)) !== null) {
                const addr = cleanAddr(pm[1]);
                if (looksLikeAddress(addr)) addResult(results, addr, 'pref', lineIdx, buildingByLine);
            }

            // --- (D) 〒付き ---
            const zipPat = /〒?\s*(\d{3}[-]?\d{4})\s*([^\n,、。]{3,50})/g;
            let zm;
            while ((zm = zipPat.exec(trimmed)) !== null) {
                addResult(results, cleanAddr(zm[1] + ' ' + zm[2]), 'zip', lineIdx, buildingByLine);
            }

            // --- (E) X丁目 単独 ---
            const choPat = /([^\s,、。]{2,10}(?:\d{1,3}|[一二三四五六七八九十]+)丁目[^\n,、。]{0,20})/g;
            let cm;
            while ((cm = choPat.exec(trimmed)) !== null) {
                const addr = cleanAddr(cm[1]);
                if (addr.length >= 5 && !isNonAddress(addr)) addResult(results, addr, 'choume', lineIdx, buildingByLine);
            }

            // --- (F) カタカナ町名 + 番地 (区なし) ---
            const kataPat = /([ァ-ヴー]{3,}(?:チョウ|マチ|ムラ|ソン|ヒガシ|ニシ|キタ|ミナミ)?\s*\d{1,5}[-]?\d{0,5})/g;
            let km;
            while ((km = kataPat.exec(trimmed)) !== null) {
                const addr = cleanAddr(km[1]);
                if (addr.length >= 4) addResult(results, addr, 'katakana', lineIdx, buildingByLine);
            }
        });

        // ===== 重複除去（長い方を優先）=====
        const unique = [];
        const sorted = results.sort((a, b) => b.address.length - a.address.length);
        sorted.forEach(item => {
            const dominated = unique.some(u => u.address.includes(item.address));
            if (!dominated) {
                // 短い重複を除去
                for (let i = unique.length - 1; i >= 0; i--) {
                    if (item.address.includes(unique[i].address)) unique.splice(i, 1);
                }
                unique.push(item);
            }
        });

        return unique;
    }

    function addResult(results, address, source, lineIdx, buildingByLine) {
        // 近くの行から建物情報を探す
        const building = buildingByLine[lineIdx + 1] || buildingByLine[lineIdx + 2] || null;
        // 完全重複チェック
        if (!results.some(r => r.address === address)) {
            results.push({ address, building, source });
        }
    }

    function cleanAddr(str) {
        if (!str) return '';
        return str.trim()
            .replace(/\s+/g, ' ')
            .replace(/^[、。,.\s:：]+/, '')
            .replace(/[、。,.\s]+$/, '')
            // 末尾のゴミ文字除去
            .replace(/\s*(?:特記|使用場所|作業|出張|進捗).*$/, '')
            .trim();
    }

    function looksLikeAddress(str) {
        if (!str || str.length < 3) return false;
        const hasAddressWord = /[区市町村郡]|丁目|番地?|号|\d{1,5}[-]\d|[ァ-ヴー]{3,}/.test(str);
        return hasAddressWord && !isNonAddress(str);
    }

    function isNonAddress(str) {
        return /^(?:作業|オーダー|未完了|進捗|状況|種別|区分|日時|取次|特記|使用場所名称|出張|報告|基本|完了|ガス|出動|情報|確認)/.test(str);
    }

    /* ============================================
       住所チップ表示
       ============================================ */
    function displayAddressChips(addresses) {
        const container = document.getElementById('address-chips');
        const wrapper = document.getElementById('address-results');
        const countEl = document.getElementById('address-count');

        if (!addresses.length) {
            wrapper.style.display = 'block';
            container.innerHTML = '<div style="color:#999;font-size:0.85em;text-align:center;padding:10px;">住所が見つかりませんでした。<br>「認識テキストを確認・編集」で内容を修正し<br>「編集テキストから再抽出」をお試しください。</div>';
            countEl.textContent = '';
            return;
        }

        wrapper.style.display = 'block';
        countEl.textContent = `(${addresses.length}件)`;
        container.innerHTML = '';

        addresses.forEach(item => {
            const fullAddr = item.building ? item.address + ' ' + item.building : item.address;
            const chip = document.createElement('div');
            chip.className = 'address-chip';
            chip.draggable = true;
            chip.dataset.address = fullAddr;

            const subHtml = item.building ? `<div class="chip-sub">🏢 ${item.building}</div>` : '';
            chip.innerHTML = `
                <span class="chip-icon">📍</span>
                <div style="flex:1;min-width:0;">
                    <span class="chip-text">${item.address}</span>
                    ${subHtml}
                </div>
                <button class="chip-remove" onclick="event.stopPropagation(); this.closest('.address-chip').remove(); updateChipCount();">×</button>
            `;

            chip.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', fullAddr);
                chip.classList.add('dragging');
                highlightDropTargets(true);
            });
            chip.addEventListener('dragend', () => { chip.classList.remove('dragging'); highlightDropTargets(false); });

            chip.addEventListener('click', (e) => {
                if (e.target.classList.contains('chip-remove')) return;
                document.querySelectorAll('.address-chip.selected').forEach(c => c.classList.remove('selected'));
                if (selectedChipAddress === fullAddr) { selectedChipAddress = null; chip.classList.remove('selected'); }
                else { selectedChipAddress = fullAddr; chip.classList.add('selected'); }
            });

            container.appendChild(chip);
        });
    }

    function updateChipCount() {
        const c = document.querySelectorAll('.address-chip').length;
        document.getElementById('address-count').textContent = c > 0 ? `(${c}件)` : '';
    }

    /* ============================================
       ドラッグ＆ドロップ / タップ挿入
       ============================================ */
    function setupDropTargets() {
        document.querySelectorAll('.address-input').forEach(input => {
            if (input.dataset.dropReady) return;
            input.dataset.dropReady = 'true';
            input.addEventListener('dragover', (e) => { e.preventDefault(); input.classList.add('drop-highlight'); });
            input.addEventListener('dragleave', () => input.classList.remove('drop-highlight'));
            input.addEventListener('drop', (e) => {
                e.preventDefault(); input.classList.remove('drop-highlight');
                const addr = e.dataTransfer.getData('text/plain');
                if (addr) { input.value = addr; saveData(); flashInput(input); }
            });
            input.addEventListener('click', () => {
                if (selectedChipAddress) {
                    input.value = selectedChipAddress;
                    saveData(); flashInput(input);
                    document.querySelectorAll('.address-chip.selected').forEach(c => c.classList.remove('selected'));
                    selectedChipAddress = null;
                }
            });
        });
    }

    function highlightDropTargets(on) {
        document.querySelectorAll('.address-input').forEach(i => {
            if (on) i.classList.add('drop-highlight'); else i.classList.remove('drop-highlight');
        });
    }

    function flashInput(input) {
        input.style.transition = 'background 0.3s';
        input.style.background = '#d5f5e3';
        setTimeout(() => { input.style.background = ''; }, 800);
    }

    /* ============================================
       データ保存 / 復元
       ============================================ */
    function saveData() {
        localStorage.setItem('sales_route_v10', JSON.stringify({
            start: document.getElementById('start-point').value,
            end: document.getElementById('end-point').value,
            waypoints: Array.from(document.querySelectorAll('.waypoint-input')).map(i => i.value),
            mode: document.getElementById('travel-mode').value,
            highways: document.getElementById('avoid-highways').checked,
            tolls: document.getElementById('avoid-tolls').checked
        }));
    }

    function loadSavedData() {
        let saved = JSON.parse(localStorage.getItem('sales_route_v10') || "{}");
        if (!saved.start && !saved.end) {
            const old = JSON.parse(localStorage.getItem('sales_route_v9') || "{}");
            if (old.start || old.end) Object.assign(saved, old);
        }
        document.getElementById('start-point').value = saved.start || "";
        document.getElementById('end-point').value = saved.end || "";
        document.getElementById('travel-mode').value = saved.mode || "DRIVING";
        document.getElementById('avoid-highways').checked = saved.highways || false;
        document.getElementById('avoid-tolls').checked = saved.tolls || false;
        if (saved.waypoints && saved.waypoints.length > 0) saved.waypoints.forEach(v => addWaypoint(v));
        else addWaypoint();
    }
