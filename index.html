<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>営業ルート最適化ナビ（視認性強化版）</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 400px; padding: 15px; overflow-y: auto; background: #fff; border-right: 1px solid #ddd; }
        #map { flex: 1; }
        @media (max-width: 768px) {
            #main-container { flex-direction: column; }
            #sidebar { width: 100%; height: 50%; order: 2; }
            #map { height: 50%; order: 1; }
        }
        .section-title { font-size: 0.85em; color: #7f8c8d; margin: 12px 0 5px; font-weight: bold; border-bottom: 1px solid #eee; }
        .input-group { margin-bottom: 8px; background: #fdfdfd; padding: 8px; border-radius: 6px; border: 1px solid #eee; display: flex; align-items: center; gap: 4px; }
        .input-group.special { background: #e8f4fd; border-color: #3498db; }
        .input-label { font-weight: bold; color: #2c3e50; width: 65px; font-size: 0.85em; flex-shrink: 0; }
        input, select { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9em; min-width: 0; }
        button { cursor: pointer; padding: 8px; border: none; border-radius: 4px; transition: 0.2s; flex-shrink: 0; }
        .primary-btn { background: #3498db; color: white; width: 100%; font-weight: bold; margin-top: 10px; }
        .go-btn { background: #27ae60; color: white; width: 100%; font-size: 1.1em; font-weight: bold; margin-top: 15px; height: 50px; }
        .location-btn { background: #e67e22; color: white; font-size: 0.75em; font-weight: bold; }
        .search-btn { background: #f1c40f; color: #2c3e50; font-size: 0.8em; font-weight: bold; }
        .remove-btn { background: #e74c3c; color: white; padding: 5px 8px; }
        .option-group { background: #fff3cd; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 0.85em; border: 1px solid #ffeeba; }
        .total-summary { background: #2c3e50; color: #fff; padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; }
        .total-summary span { font-size: 1.4em; font-weight: bold; color: #f1c40f; }
        .info-panel { margin-top: 15px; padding: 12px; background: #fafafa; border-radius: 8px; border: 1px solid #ddd; }
        .leg-info { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .route-link { display: block; padding: 10px; margin-top: 5px; background: white; border: 2px solid #3498db; color: #3498db; text-decoration: none; border-radius: 6px; font-weight: bold; text-align: center; }

        .dist-label-box {
            position: absolute; background: #fff; color: #e74c3c;
            font-weight: bold; font-size: 13px; padding: 4px 10px;
            border: 2.5px solid #e74c3c; border-radius: 6px;
            white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            transform: translate(-50%, -50%); pointer-events: none; z-index: 100;
        }
        .dist-label-box::after {
            content: ''; position: absolute; bottom: -7px; left: 50%;
            transform: translateX(-50%); width: 0; height: 0;
            border-left: 6px solid transparent; border-right: 6px solid transparent;
            border-top: 7px solid #e74c3c;
        }

        .parking-status { font-size: 0.8em; color: #7f8c8d; text-align: center; margin-top: 6px; padding: 4px 8px; background: #f8f9fa; border-radius: 4px; display: none; }
        .parking-status.active { display: block; }

        /* ===== 住所読み取りパネル ===== */
        .reader-toggle-btn {
            background: linear-gradient(135deg, #8e44ad, #9b59b6); color: white;
            width: 100%; font-weight: bold; font-size: 0.95em;
            margin-bottom: 10px; padding: 10px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .reader-toggle-btn:hover { opacity: 0.9; }
        .reader-panel { display: none; background: #f5f0ff; border: 1.5px solid #d5c8f0; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .reader-panel.open { display: block; animation: panelSlide 0.3s ease; }
        @keyframes panelSlide { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

        .reader-panel .tab-bar { display: flex; gap: 4px; margin-bottom: 10px; }
        .reader-panel .tab-btn { flex: 1; padding: 7px; font-size: 0.8em; font-weight: bold; border-radius: 4px; background: #e8e0f5; color: #6c5b7b; text-align: center; }
        .reader-panel .tab-btn.active { background: #8e44ad; color: white; }
        .reader-panel .tab-content { display: none; }
        .reader-panel .tab-content.active { display: block; }
        .reader-panel textarea { width: 100%; min-height: 80px; padding: 8px; border: 1px solid #d5c8f0; border-radius: 4px; font-size: 0.85em; resize: vertical; font-family: inherit; }

        /* 画像アップロード */
        .image-upload-area { margin-bottom: 8px; }
        .image-upload-btns { display: flex; gap: 6px; margin-bottom: 8px; }
        .image-upload-btns button { flex: 1; padding: 10px; font-weight: bold; font-size: 0.85em; }
        .upload-file-btn { background: #8e44ad; color: white; }
        .upload-file-btn:hover { background: #7d3c98; }
        .upload-camera-btn { background: #e67e22; color: white; }

        .image-drop-zone {
            border: 2px dashed #c0a8e0; border-radius: 8px; padding: 15px;
            text-align: center; color: #8e44ad; font-size: 0.82em;
            cursor: pointer; transition: 0.2s; background: #faf7ff;
        }
        .image-drop-zone.dragover { background: #ede3ff; border-color: #8e44ad; }

        /* 複数画像プレビュー */
        .image-thumbs { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .image-thumb {
            position: relative; width: 70px; height: 70px; border-radius: 6px;
            overflow: hidden; border: 2px solid #d5c8f0;
        }
        .image-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .image-thumb .thumb-remove {
            position: absolute; top: 1px; right: 1px; background: rgba(231,76,60,0.9);
            color: white; border: none; border-radius: 50%; width: 18px; height: 18px;
            font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            padding: 0;
        }
        .image-thumb-count { font-size: 0.75em; color: #8e44ad; text-align: center; }

        .extract-btn { background: #8e44ad; color: white; width: 100%; font-weight: bold; margin-top: 8px; padding: 10px; }
        .extract-btn:disabled { background: #bbb; cursor: not-allowed; }

        .ocr-progress { margin-top: 8px; display: none; }
        .ocr-progress.active { display: block; }
        .ocr-progress-bar { height: 6px; background: #e8e0f5; border-radius: 3px; overflow: hidden; }
        .ocr-progress-fill { height: 100%; background: linear-gradient(90deg, #8e44ad, #e74c3c); border-radius: 3px; transition: width 0.3s; width: 0%; }
        .ocr-progress-text { font-size: 0.75em; color: #8e44ad; margin-top: 3px; text-align: center; }

        .ocr-raw-toggle { font-size: 0.75em; color: #8e44ad; cursor: pointer; text-decoration: underline; margin-top: 6px; display: none; text-align: right; }
        .ocr-raw-toggle.active { display: block; }
        .ocr-raw-area { display: none; margin-top: 4px; }
        .ocr-raw-area.open { display: block; }
        .ocr-raw-area textarea { width: 100%; min-height: 120px; font-size: 0.78em; color: #333; background: #f9f7fd; border: 1px solid #e8e0f5; }
        .re-extract-btn { background: #6c5b7b; color: white; width: 100%; font-weight: bold; margin-top: 4px; padding: 8px; font-size: 0.85em; }

        /* 住所チップ */
        .address-results { margin-top: 10px; }
        .address-results-title { font-size: 0.8em; font-weight: bold; color: #6c5b7b; margin-bottom: 6px; }
        .address-chip {
            display: flex; align-items: center; gap: 6px; padding: 8px 10px;
            margin-bottom: 5px; background: white; border: 1.5px solid #d5c8f0;
            border-radius: 6px; cursor: grab; font-size: 0.85em; transition: 0.2s; user-select: none;
        }
        .address-chip:hover { border-color: #8e44ad; box-shadow: 0 2px 6px rgba(142,68,173,0.2); }
        .address-chip.selected { background: #8e44ad; color: white; border-color: #8e44ad; }
        .address-chip .chip-icon { font-size: 1em; flex-shrink: 0; }
        .address-chip .chip-sub { font-size: 0.75em; color: #999; }
        .address-chip.selected .chip-sub { color: rgba(255,255,255,0.7); }
        .address-chip .chip-remove { background: none; border: none; color: #999; cursor: pointer; padding: 0 2px; font-size: 1.1em; flex-shrink: 0; }
        .address-chip.selected .chip-remove { color: rgba(255,255,255,0.7); }
        .address-chip.dragging { opacity: 0.5; }

        .address-input.drop-highlight { outline: 3px solid #8e44ad !important; outline-offset: -1px; background: #f5f0ff !important; }
        .chip-hint { font-size: 0.72em; color: #999; text-align: center; margin-top: 4px; }

        .url-input-row { display: flex; gap: 4px; margin-bottom: 6px; }
        .url-input-row input { flex: 1; font-size: 0.85em; }
        .url-fetch-btn { background: #8e44ad; color: white; font-size: 0.8em; font-weight: bold; white-space: nowrap; padding: 8px 12px; }

        #preprocess-canvas { display: none; }

        /* 隠しファイル入力 */
        .hidden-file-input { display: none; }
    </style>
</head>
<body>

<header>営業ルートナビ（視認性強化版 v2）</header>

<div id="main-container">
    <div id="sidebar">
        <div id="total-display" class="total-summary" style="display:none;">
            総移動距離: <span id="total-km">0.0</span> km
        </div>

        <!-- ===== 住所読み取りパネル ===== -->
        <button class="reader-toggle-btn" onclick="toggleReaderPanel()">
            📷 住所読み取り（画像・テキスト）<span id="reader-arrow">▼</span>
        </button>
        <div id="reader-panel" class="reader-panel">
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchReaderTab('image', this)">📷 画像OCR</button>
                <button class="tab-btn" onclick="switchReaderTab('text', this)">📋 テキスト貼付</button>
                <button class="tab-btn" onclick="switchReaderTab('url', this)">🔗 URL読取</button>
            </div>

            <!-- 画像OCRタブ -->
            <div id="tab-image" class="tab-content active">
                <div class="image-upload-area">
                    <div class="image-upload-btns">
                        <button class="upload-file-btn" onclick="document.getElementById('file-input-multi').click()">📁 ファイルを選択</button>
                        <button class="upload-camera-btn" onclick="document.getElementById('file-input-camera').click()">📷 カメラで撮影</button>
                    </div>
                    <input type="file" id="file-input-multi" class="hidden-file-input" accept="image/*" multiple onchange="handleMultiFiles(event)">
                    <input type="file" id="file-input-camera" class="hidden-file-input" accept="image/*" capture="environment" onchange="handleMultiFiles(event)">

                    <div class="image-drop-zone" id="image-drop-zone">
                        ここに画像をドラッグ＆ドロップ（複数可）
                    </div>

                    <div class="image-thumbs" id="image-thumbs"></div>
                    <div class="image-thumb-count" id="image-thumb-count"></div>
                </div>

                <button class="extract-btn" id="ocr-extract-btn" onclick="runAllOCR()" disabled>🔍 住所を読み取る</button>
                <div class="ocr-progress" id="ocr-progress">
                    <div class="ocr-progress-bar"><div class="ocr-progress-fill" id="ocr-progress-fill"></div></div>
                    <div class="ocr-progress-text" id="ocr-progress-text">読み込み準備中...</div>
                </div>
                <div class="ocr-raw-toggle" id="ocr-raw-toggle" onclick="toggleOCRRaw()">▶ 認識テキストを確認・編集</div>
                <div class="ocr-raw-area" id="ocr-raw-area">
                    <textarea id="ocr-raw-text" placeholder="OCR認識結果（正規化済み）がここに表示されます"></textarea>
                    <button class="re-extract-btn" onclick="reExtractFromRaw()">🔄 編集テキストから再抽出</button>
                </div>
            </div>

            <!-- テキスト貼付タブ -->
            <div id="tab-text" class="tab-content">
                <textarea id="text-input" placeholder="住所を含むテキストをここに貼り付けてください。&#10;例: 住所（行政区・町）中村区亀島一丁目2番4号&#10;    建物 プレサンスロジェ名古屋駅ノースフロント 1105"></textarea>
                <button class="extract-btn" onclick="extractFromText()">🔍 住所を抽出する</button>
            </div>

            <!-- URL読取タブ -->
            <div id="tab-url" class="tab-content">
                <div class="url-input-row">
                    <input type="text" id="url-input" placeholder="https://example.com">
                    <button class="url-fetch-btn" onclick="fetchFromURL()">取得</button>
                </div>
                <div style="font-size:0.72em; color:#999; margin-bottom:6px;">※ CORS制限により一部サイトは取得できません</div>
                <textarea id="url-text-result" placeholder="取得結果がここに表示されます" readonly style="min-height:60px;"></textarea>
                <button class="extract-btn" onclick="extractFromURLText()">🔍 住所を抽出する</button>
            </div>

            <!-- 抽出結果 -->
            <div class="address-results" id="address-results" style="display:none;">
                <div class="address-results-title">📍 抽出された住所候補 <span id="address-count"></span></div>
                <div id="address-chips"></div>
                <div class="chip-hint">💡 PC: ドラッグ＆ドロップで入力欄へ ／ スマホ: タップで選択→入力欄をタップ</div>
            </div>
        </div>

        <!-- ===== START ===== -->
        <div class="section-title">START</div>
        <div class="input-group special">
            <span class="input-label">現在地</span>
            <input type="text" id="start-point" class="address-input" placeholder="住所または施設名" onchange="saveData()">
            <button class="remove-btn" onclick="clearValue('start-point')">×</button>
            <button class="search-btn" onclick="openGMap('start-point')">🔍</button>
            <button id="gps-btn" class="location-btn" onclick="getCurrentLocation()">GPS</button>
        </div>

        <div class="section-title">WAYPOINTS</div>
        <div id="waypoint-inputs"></div>
        <button class="primary-btn" onclick="addWaypoint()">＋ 経由地を追加</button>

        <div class="section-title">GOAL</div>
        <div class="input-group special">
            <span class="input-label">目的地</span>
            <input type="text" id="end-point" class="address-input" placeholder="最後に行く場所" onchange="saveData()">
            <button class="remove-btn" onclick="clearValue('end-point')">×</button>
            <button class="search-btn" onclick="openGMap('end-point')">🔍</button>
        </div>

        <div class="option-group">
            <div style="margin-bottom:8px; display:flex; align-items:center; gap:10px;">
                <span class="input-label" style="width:auto;">移動手段:</span>
                <select id="travel-mode" onchange="saveData()">
                    <option value="DRIVING">自動車</option>
                    <option value="WALKING">徒歩</option>
                    <option value="BICYCLING">自転車</option>
                    <option value="TRANSIT">電車・バス</option>
                </select>
            </div>
            <div>
                <label><input type="checkbox" id="avoid-highways" onchange="saveData()"> 高速回避</label>
                <label style="margin-left:10px;"><input type="checkbox" id="avoid-tolls" onchange="saveData()"> 有料道回避</label>
            </div>
        </div>

        <button class="go-btn" onclick="calculateRoute()">ルートを表示 ＆ 駐車場検索</button>
        <div class="parking-status" id="parking-status"></div>
        <div id="info" class="info-panel"></div>
    </div>
    <div id="map"></div>
</div>

<canvas id="preprocess-canvas"></canvas>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCIj6xwk9pkWn9YbiAymzFt04AG_XrmC40&libraries=places&callback=initMap" async defer></script>

<script>
    let map, directionsService, directionsRenderer, infoWindow;
    let customMarkers = [], customOverlays = [];
    let selectedChipAddress = null;
    let DistanceLabelOverlay = null;

    // 複数画像管理
    let uploadedImages = []; // { file, dataURL, preprocessed }

    /* ============================================
       初期化
       ============================================ */
    function initMap() {
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ suppressMarkers: true });
        infoWindow = new google.maps.InfoWindow();
        map = new google.maps.Map(document.getElementById('map'), { zoom: 13, center: { lat: 35.1815, lng: 136.9066 } });
        directionsRenderer.setMap(map);

        DistanceLabelOverlay = class extends google.maps.OverlayView {
            constructor(position, text) { super(); this.position = position; this.text = text; this.div = null; }
            onAdd() { this.div = document.createElement('div'); this.div.className = 'dist-label-box'; this.div.textContent = this.text; this.getPanes().overlayLayer.appendChild(this.div); }
            draw() { const p = this.getProjection(); if (!p || !this.div) return; const pos = p.fromLatLngToDivPixel(this.position); if (pos) { this.div.style.left = pos.x + 'px'; this.div.style.top = pos.y + 'px'; } }
            onRemove() { if (this.div && this.div.parentNode) { this.div.parentNode.removeChild(this.div); this.div = null; } }
        };
        loadSavedData();
        setupDropTargets();
    }

    function createDistanceLabel(position, text) { const o = new DistanceLabelOverlay(position, text); o.setMap(map); customOverlays.push(o); }

    /* ============================================
       基本操作
       ============================================ */
    function clearValue(id) { document.getElementById(id).value = ""; saveData(); }
    function openGMap(id) { const v = document.getElementById(id).value; if (v) window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(v)}`, '_blank'); }
    function openGMapByElement(el) { const v = el.parentElement.querySelector('input').value; if (v) window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(v)}`, '_blank'); }

    function getCurrentLocation() {
        const btn = document.getElementById('gps-btn');
        if (!navigator.geolocation) return;
        btn.innerText = "中...";
        navigator.geolocation.getCurrentPosition(pos => {
            new google.maps.Geocoder().geocode({ location: { lat: pos.coords.latitude, lng: pos.coords.longitude } }, (r, s) => {
                if (s === "OK" && r[0]) { document.getElementById('start-point').value = r[0].formatted_address; saveData(); }
                btn.innerText = "GPS";
            });
        }, () => { btn.innerText = "GPS"; }, { enableHighAccuracy: true, timeout: 10000 });
    }

    function addWaypoint(value = "") {
        const container = document.getElementById('waypoint-inputs');
        const div = document.createElement('div');
        div.className = 'input-group';
        div.innerHTML = `<span class="input-label"></span><input type="text" class="waypoint-input address-input" placeholder="住所または施設名" value="${value}" onchange="saveData()"><button class="search-btn" onclick="openGMapByElement(this)">🔍</button><button class="remove-btn" onclick="this.parentElement.remove(); reLabel(); saveData();">×</button>`;
        container.appendChild(div);
        reLabel();
        setupDropTargets();
    }

    function reLabel() {
        document.querySelectorAll('.waypoint-input').forEach((el, i) => { el.previousElementSibling.innerText = `地点 ${String.fromCharCode(65 + i)}`; });
    }

    /* ============================================
       ルート計算
       ============================================ */
    function calculateRoute() {
        customMarkers.forEach(m => m.setMap(null)); customMarkers = [];
        customOverlays.forEach(o => o.setMap(null)); customOverlays = [];
        const start = document.getElementById('start-point').value;
        const end = document.getElementById('end-point').value;
        const mode = document.getElementById('travel-mode').value;
        const waypointValues = Array.from(document.querySelectorAll('.waypoint-input')).map(i => i.value).filter(v => v);
        if (mode === "TRANSIT" && waypointValues.length > 0) alert("電車モードは経由地に非対応です。個別ナビをご利用ください。");
        if (!start || !end) return;
        updateParkingStatus("searching");
        let pTotal = 0, pRemain = 0;
        directionsService.route({
            origin: start, destination: end,
            waypoints: mode === "TRANSIT" ? [] : waypointValues.map(l => ({ location: l, stopover: true })),
            travelMode: google.maps.TravelMode[mode],
            avoidHighways: document.getElementById('avoid-highways').checked,
            avoidTolls: document.getElementById('avoid-tolls').checked,
            optimizeWaypoints: false
        }, (resp, status) => {
            if (status !== 'OK') return alert("ルート計算失敗: " + status);
            directionsRenderer.setDirections(resp);
            const legs = resp.routes[0].legs;
            let totalM = 0;
            createMarker(legs[0].start_location, "現", "#e74c3c", start);
            legs.forEach((leg, i) => {
                totalM += leg.distance.value;
                createDistanceLabel(leg.steps[Math.floor(leg.steps.length / 2)].start_location, leg.distance.text);
                if (i < legs.length - 1) {
                    createMarker(leg.end_location, String.fromCharCode(65 + i), "#3498db", waypointValues[i]);
                    pRemain++; searchParking(leg.end_location, c => { pTotal += c; if (--pRemain === 0) updateParkingStatus("done", pTotal); });
                }
            });
            createMarker(legs[legs.length - 1].end_location, "目", "#27ae60", end);
            pRemain++; searchParking(legs[legs.length - 1].end_location, c => { pTotal += c; if (--pRemain === 0) updateParkingStatus("done", pTotal); });
            document.getElementById('total-display').style.display = 'block';
            document.getElementById('total-km').innerText = (totalM / 1000).toFixed(1);
            displayNavLinks(legs, start, end, waypointValues, mode);
        });
    }

    function createMarker(position, label, color, address) {
        const m = new google.maps.Marker({ position, map, label: { text: label, color: "white", fontWeight: "bold" }, icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: color, fillOpacity: 1, strokeColor: "white", strokeWeight: 2, scale: 15 } });
        m.addListener('click', () => { infoWindow.setContent(`<div><strong>${label}</strong><br>${address}<br><a style="color:#3498db;cursor:pointer;" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}','_blank')">Googleマップで表示</a></div>`); infoWindow.open(map, m); });
        customMarkers.push(m);
    }

    /* 駐車場 */
    function updateParkingStatus(state, count) {
        const el = document.getElementById('parking-status'); el.classList.add('active');
        if (state === "searching") { el.innerHTML = "🔍 駐車場を検索中..."; el.style.color = "#e67e22"; }
        else { el.innerHTML = count > 0 ? `🅿️ ${count}件の駐車場が見つかりました` : "⚠️ 付近に駐車場なし"; el.style.color = count > 0 ? "#27ae60" : "#e74c3c"; setTimeout(() => el.style.color = "#7f8c8d", 3000); }
    }
    function searchParking(pos, cb) {
        const svc = new google.maps.places.PlacesService(map);
        svc.nearbySearch({ location: pos, radius: 500, type: 'parking' }, (r1, s1) => {
            const f = s1 === google.maps.places.PlacesServiceStatus.OK ? r1 : [];
            let n = addPM(f);
            svc.nearbySearch({ location: pos, radius: 500, keyword: '駐車場 コインパーキング' }, (r2, s2) => {
                const ids = new Set(f.map(r => r.place_id));
                n += addPM((s2 === google.maps.places.PlacesServiceStatus.OK ? r2 : []).filter(r => !ids.has(r.place_id)));
                cb(n);
            });
        });
    }
    function addPM(results) {
        if (!results || !results.length) return 0;
        results.forEach(p => {
            const m = new google.maps.Marker({ map, position: p.geometry.location, label: { text: "P", color: "white", fontSize: "10px", fontWeight: "bold" }, icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: "#34495e", fillOpacity: 0.85, scale: 10, strokeColor: "white", strokeWeight: 1.5 } });
            m.addListener('click', () => { infoWindow.setContent(`<div><strong>🅿️ ${p.name}</strong><br>${p.vicinity || ''}<br>評価: ${p.rating ? p.rating + '⭐' : '---'}</div>`); infoWindow.open(map, m); });
            customMarkers.push(m);
        });
        return results.length;
    }
    function displayNavLinks(legs, start, end, wp, mode) {

        const mm = { DRIVING: "driving", WALKING: "walking", BICYCLING: "bicycling", TRANSIT: "transit" }[mode];

        legs.forEach((l, i) => { h += `<div class="leg-info"><div style="font-size:0.9em;font-weight:bold;">${labels[i]} → ${labels[i+1]}</div><div style="font-size:0.85em;color:#e67e22;font-weight:bold;">${l.distance.text} (${l.duration.text})</div><a href="https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(vals[i])}&destination=${encodeURIComponent(vals[i+1])}&travelmode=${mm}" target="_blank" class="route-link">🚗 ナビ開始</a></div>`; });

    /* === 画像前処理 === */
    function preprocessImage(dataURL) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('preprocess-canvas');
                const ctx = canvas.getContext('2d');
                const scale = Math.min(2, 4000 / Math.max(img.width, img.height));
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const d = id.data;
                for (let i = 0; i < d.length; i += 4) {
                    let g = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
                    g = ((g - 128) * 1.6) + 128 + 10;
                    g = Math.max(0, Math.min(255, g));
                    if (g > 180) g = 255; else if (g < 80) g = 0;
                    d[i] = d[i+1] = d[i+2] = g;
                }
                ctx.putImageData(id, 0, 0);
                resolve(canvas.toDataURL('image/png'));
            };
            img.src = dataURL;
        });
    }

    /* === Tesseract === */
    let tesseractLoaded = false;
    async function loadTesseract() {
        if (tesseractLoaded || window.Tesseract) { tesseractLoaded = true; return; }
        return new Promise((res, rej) => {
            const s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js';
            s.onload = () => { tesseractLoaded = true; res(); };
            s.onerror = () => rej(new Error('Tesseract.js 読み込み失敗'));
            document.head.appendChild(s);
        });
    }

    /* === 全画像をOCR === */
    async function runAllOCR() {
        if (uploadedImages.length === 0) return;
        const progressEl = document.getElementById('ocr-progress');
        const fillEl = document.getElementById('ocr-progress-fill');
        const textEl = document.getElementById('ocr-progress-text');
        const btn = document.getElementById('ocr-extract-btn');

        btn.disabled = true;
        progressEl.classList.add('active');
        fillEl.style.width = '5%';
        textEl.textContent = 'OCRエンジンを読み込み中...';

        try {
            await loadTesseract();
            fillEl.style.width = '10%';
            textEl.textContent = '日本語データを準備中...';

            const worker = await Tesseract.createWorker({
                logger: m => {
                    if (m.status === 'loading language traineddata') { textEl.textContent = '言語データDL中...'; }
                }
            });
            await worker.loadLanguage('jpn+eng');
            await worker.initialize('jpn+eng');
            await worker.setParameters({ tessedit_pageseg_mode: '6' });

            let allText = '';
            const total = uploadedImages.length;

            for (let i = 0; i < total; i++) {
                const baseP = 15 + (i / total) * 80;
                fillEl.style.width = baseP + '%';
                textEl.textContent = `画像 ${i + 1}/${total} を前処理中...`;

                // 前処理
                const preprocessed = await preprocessImage(uploadedImages[i].dataURL);

                textEl.textContent = `画像 ${i + 1}/${total} を認識中...`;
                const { data: { text } } = await worker.recognize(preprocessed);
                allText += `\n--- 画像${i + 1} ---\n` + text;

                fillEl.style.width = (15 + ((i + 1) / total) * 80) + '%';
            }

            await worker.terminate();
            fillEl.style.width = '98%';
            textEl.textContent = '正規化＆住所抽出中...';

            // 正規化してから表示
            const normalized = normalizeOCRText(allText);
            document.getElementById('ocr-raw-text').value = normalized;
            document.getElementById('ocr-raw-toggle').classList.add('active');
            console.log('=== 正規化済みOCRテキスト ===\n' + normalized);

            const addresses = extractAddresses(normalized);
            displayAddressChips(addresses);

            if (addresses.length === 0) {
                document.getElementById('ocr-raw-area').classList.add('open');
                document.getElementById('ocr-raw-toggle').textContent = '▼ 認識テキストを閉じる';
            }

            fillEl.style.width = '100%';
            textEl.textContent = `完了！ ${addresses.length}件の住所を検出`;
            setTimeout(() => { progressEl.classList.remove('active'); btn.disabled = false; }, 1500);

        } catch (err) {
            textEl.textContent = 'エラー: ' + err.message;
            fillEl.style.width = '0%';
            btn.disabled = false;
        }
    }

    /* ============================================
       OCRテキスト正規化（文字化け解消の核心）
       ============================================ */
    function normalizeOCRText(text) {
        let t = text;

        // ① 丸囲み数字 → 半角数字
        const circled = '①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳';
        for (let i = 0; i < circled.length; i++) {
            t = t.replaceAll(circled[i], String(i + 1));
        }

        // ② 全角数字 → 半角
        t = t.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));

        // ③ 全角英字 → 半角
        t = t.replace(/[Ａ-Ｚａ-ｚ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));

        // ④ 各種ハイフン・ダッシュ → 半角ハイフン
        t = t.replace(/[－ー―‐–—﹣−〜~]/g, '-');

        // ⑤ 全角スペース → 半角
        t = t.replace(/　/g, ' ');

        // ⑥ OCR誤認識の典型パターン補正
        // 「反」→「区」（行政区の文脈で）
        t = t.replace(/行\s*政\s*反/g, '行政区');
        t = t.replace(/作\s*業\s*反\s*分/g, '作業区分');
        // 「灰」→「町」（行政区・町の文脈で）
        t = t.replace(/行政区[・\s]*灰/g, '行政区・町');
        // 「楚」→「業」
        t = t.replace(/作\s*楚/g, '作業');
        // 「月」→「日」（出張予定日時の文脈で）
        t = t.replace(/予\s*定\s*月\s*時/g, '予定日時');
        // 「槍」「榮」→「棟」
        t = t.replace(/建\s*物\s*[・]\s*[槍榮棒]/g, '建物・棟');
        // 「琴」→「建」
        t = t.replace(/琴\s*物/g, '建物');
        // 「炸」→「作」
        t = t.replace(/炸\s*業/g, '作業');
        // 「狂」→「状」
        t = t.replace(/狂\s*況/g, '状況');
        // 「弾」→「張」
        t = t.replace(/出\s*弾/g, '出張');
        // 「茂」→「称」
        t = t.replace(/名\s*茂/g, '名称');
        // 「柳」→「栓」
        t = t.replace(/開\s*柳/g, '開栓');

        // ⑦ 数字間のスペース除去（「8-2 8」→「8-28」のような）
        t = t.replace(/(\d)\s+(\d)/g, '$1$2');

        // ⑧ 不要な半角スペース圧縮（日本語間のスペース）
        // 「中 村 区 亀 島」→「中村区亀島」
        t = t.replace(/([\u3000-\u9fff\u30A0-\u30FF])\s+([\u3000-\u9fff\u30A0-\u30FF])/g, '$1$2');
        // 繰り返し適用（3文字以上の連続に対応）
        t = t.replace(/([\u3000-\u9fff\u30A0-\u30FF])\s+([\u3000-\u9fff\u30A0-\u30FF])/g, '$1$2');
        t = t.replace(/([\u3000-\u9fff\u30A0-\u30FF])\s+([\u3000-\u9fff\u30A0-\u30FF])/g, '$1$2');

        return t;
    }

    /* ============================================
       住所抽出ロジック（キーワードベース）
       ============================================ */
    function extractAddresses(rawText) {
        const text = normalizeOCRText(rawText); // 再度正規化（手動編集後にも対応）
        const lines = text.split(/[\n\r]+/);
        const results = [];

        // === 建物情報を先に収集 ===
        const buildings = {};
        lines.forEach((line, idx) => {
            const m = line.match(/建物[・\s]*棟[・\s]*号室\s*(.*)/);
            if (m && m[1].trim().length > 1) {
                const bld = m[1].trim().replace(/^[\s:：]+/, '');
                if (!/^(?:あり|なし)$/.test(bld)) buildings[idx] = bld;
            }
        });

        // === 行ごとに「住所」キーワードで抽出 ===
        lines.forEach((line, idx) => {
            const trimmed = line.trim();

            // ★ 最優先: 「住所」「行政区」キーワードの後ろを取得
            if (/住所|行政区/.test(trimmed)) {
                // 「住所（行政区・町）中村区亀島一丁目2番4号」
                // 「住所(行政区・町) 中村区亀島一丁目8-28」
                let addr = trimmed;
                // キーワード部分を除去
                addr = addr.replace(/^.*?住所\s*[\(（][^)）]*[\)）]\s*/, '');
                addr = addr.replace(/^.*?住所\s*/, '');
                addr = addr.replace(/^.*?行政区[・\s]*[町区灰]\s*[\)）]?\s*/, '');
                addr = addr.trim();

                if (addr.length >= 4 && hasAddressChar(addr)) {
                    // 住所の末尾のゴミ除去
                    addr = trimAddressEnd(addr);
                    const bld = findBuilding(buildings, idx);
                    results.push({ address: addr, building: bld });
                }
            }
        });

        // === フォールバック: キーワードで取れなかった場合はパターンマッチ ===
        if (results.length === 0) {
            lines.forEach((line, idx) => {
                const trimmed = line.trim();
                // 区名 + 何か + 番地
                const patterns = [
                    /([^\s,。]{1,5}区[^\s,。]{1,20}(?:\d{1,5}[-]\d{1,5}(?:[-]\d{1,5})?|\d{1,3}丁目[^\s,。]{0,15}|[一二三四五六七八九十]+丁目[^\s,。]{0,15}))/g,
                    /([^\s,。]{1,5}区\s*[ァ-ヴー]{2,15}\s*\d{1,5}[-]?\d{0,5})/g,
                    /((?:北海道|東京都|(?:京都|大阪)府|.{2,3}県)[^\n,。]{3,50})/g,
                ];
                patterns.forEach(pat => {
                    let m;
                    while ((m = pat.exec(trimmed)) !== null) {
                        const addr = trimAddressEnd(m[1].trim());
                        if (addr.length >= 5 && hasAddressChar(addr) && !isNonAddress(addr)) {
                            results.push({ address: addr, building: findBuilding(buildings, idx) });
                        }
                    }
                });
            });
        }

        // === 重複除去 ===
        const unique = [];
        results.forEach(item => {
            if (!unique.some(u => u.address === item.address || u.address.includes(item.address))) {
                // 短い既存エントリを除去
                for (let i = unique.length - 1; i >= 0; i--) {
                    if (item.address.includes(unique[i].address)) unique.splice(i, 1);
                }
                unique.push(item);
            }
        });

        return unique;
    }

    function hasAddressChar(s) {
        return /[区市町村]|丁目|番|号|\d{1,5}[-]\d|[ァ-ヴー]{3,}/.test(s);
    }

    function isNonAddress(s) {
        return /^(?:作業|オーダー|未完了|進捗|状況|種別|区分|日時|取次|特記|使用場所名称|出張|報告|基本|完了|ガス|出動|情報|確認)/.test(s);
    }

    function trimAddressEnd(s) {
        return s.replace(/\s*(?:特記|使用場所|作業|出張|進捗|P\s*M|建物|オーダー).*$/, '').trim();
    }

    function findBuilding(buildings, lineIdx) {
        return buildings[lineIdx + 1] || buildings[lineIdx + 2] || null;
    }

    /* ============================================
       住所チップ表示
       ============================================ */
    function displayAddressChips(addresses) {
        const container = document.getElementById('address-chips');
        const wrapper = document.getElementById('address-results');
        const countEl = document.getElementById('address-count');

        if (!addresses.length) {
            wrapper.style.display = 'block';
            container.innerHTML = '<div style="color:#999;font-size:0.85em;text-align:center;padding:10px;">住所が見つかりませんでした。<br>「認識テキストを確認・編集」で修正後<br>「再抽出」をお試しください。</div>';
            countEl.textContent = ''; return;
        }
        wrapper.style.display = 'block';
        countEl.textContent = `(${addresses.length}件)`;
        container.innerHTML = '';

        addresses.forEach(item => {
            const full = item.building ? item.address + ' ' + item.building : item.address;
            const chip = document.createElement('div');
            chip.className = 'address-chip'; chip.draggable = true; chip.dataset.address = full;
            const sub = item.building ? `<div class="chip-sub">🏢 ${item.building}</div>` : '';
            chip.innerHTML = `<span class="chip-icon">📍</span><div style="flex:1;min-width:0;"><span class="chip-text">${item.address}</span>${sub}</div><button class="chip-remove" onclick="event.stopPropagation();this.closest('.address-chip').remove();updateChipCount();">×</button>`;
            chip.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', full); chip.classList.add('dragging'); highlightDropTargets(true); });
            chip.addEventListener('dragend', () => { chip.classList.remove('dragging'); highlightDropTargets(false); });
            chip.addEventListener('click', e => {
                if (e.target.classList.contains('chip-remove')) return;
                document.querySelectorAll('.address-chip.selected').forEach(c => c.classList.remove('selected'));
                if (selectedChipAddress === full) { selectedChipAddress = null; chip.classList.remove('selected'); }
                else { selectedChipAddress = full; chip.classList.add('selected'); }
            });
            container.appendChild(chip);
        });
    }

    function updateChipCount() { document.getElementById('address-count').textContent = document.querySelectorAll('.address-chip').length > 0 ? `(${document.querySelectorAll('.address-chip').length}件)` : ''; }

    /* ドラッグ＆ドロップ */
    function setupDropTargets() {
        document.querySelectorAll('.address-input').forEach(input => {
            if (input.dataset.dropReady) return;
            input.dataset.dropReady = 'true';
            input.addEventListener('dragover', e => { e.preventDefault(); input.classList.add('drop-highlight'); });
            input.addEventListener('dragleave', () => input.classList.remove('drop-highlight'));
            input.addEventListener('drop', e => { e.preventDefault(); input.classList.remove('drop-highlight'); const a = e.dataTransfer.getData('text/plain'); if (a) { input.value = a; saveData(); flashInput(input); } });
            input.addEventListener('click', () => { if (selectedChipAddress) { input.value = selectedChipAddress; saveData(); flashInput(input); document.querySelectorAll('.address-chip.selected').forEach(c => c.classList.remove('selected')); selectedChipAddress = null; } });
        });
    }
    function highlightDropTargets(on) { document.querySelectorAll('.address-input').forEach(i => { if (on) i.classList.add('drop-highlight'); else i.classList.remove('drop-highlight'); }); }
    function flashInput(input) { input.style.transition = 'background 0.3s'; input.style.background = '#d5f5e3'; setTimeout(() => input.style.background = '', 800); }

    /* データ保存 */
    function saveData() {
        localStorage.setItem('sales_route_v10', JSON.stringify({
            start: document.getElementById('start-point').value,
            end: document.getElementById('end-point').value,
            waypoints: Array.from(document.querySelectorAll('.waypoint-input')).map(i => i.value),
            mode: document.getElementById('travel-mode').value,
            highways: document.getElementById('avoid-highways').checked,
            tolls: document.getElementById('avoid-tolls').checked
        }));
    }
    function loadSavedData() {
        let s = JSON.parse(localStorage.getItem('sales_route_v10') || "{}");
        if (!s.start && !s.end) { const o = JSON.parse(localStorage.getItem('sales_route_v9') || "{}"); if (o.start || o.end) Object.assign(s, o); }
        document.getElementById('start-point').value = s.start || "";
        document.getElementById('end-point').value = s.end || "";
        document.getElementById('travel-mode').value = s.mode || "DRIVING";
        document.getElementById('avoid-highways').checked = s.highways || false;
        document.getElementById('avoid-tolls').checked = s.tolls || false;
        if (s.waypoints && s.waypoints.length) s.waypoints.forEach(v => addWaypoint(v));
        else addWaypoint();
    }
</script>
</body>
</html>
