<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>営業ルート最適化ナビ（視認性強化版）</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2em; }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 400px; padding: 15px; overflow-y: auto; background: #fff; border-right: 1px solid #ddd; }
        #map { flex: 1; }
        @media (max-width: 768px) {
            #main-container { flex-direction: column; }
            #sidebar { width: 100%; height: 50%; order: 2; }
            #map { height: 50%; order: 1; }
        }
        .section-title { font-size: 0.85em; color: #7f8c8d; margin: 12px 0 5px; font-weight: bold; border-bottom: 1px solid #eee; }
        .input-group { margin-bottom: 8px; background: #fdfdfd; padding: 8px; border-radius: 6px; border: 1px solid #eee; display: flex; align-items: center; gap: 4px; }
        .input-group.special { background: #e8f4fd; border-color: #3498db; }
        .input-label { font-weight: bold; color: #2c3e50; width: 65px; font-size: 0.85em; flex-shrink: 0; }
        input, select { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9em; min-width: 0; }
        button { cursor: pointer; padding: 8px; border: none; border-radius: 4px; transition: 0.2s; flex-shrink: 0; }
        .primary-btn { background: #3498db; color: white; width: 100%; font-weight: bold; margin-top: 10px; }
        .go-btn { background: #27ae60; color: white; width: 100%; font-size: 1.1em; font-weight: bold; margin-top: 15px; height: 50px; }
        .location-btn { background: #e67e22; color: white; font-size: 0.75em; font-weight: bold; }
        .search-btn { background: #f1c40f; color: #2c3e50; font-size: 0.8em; font-weight: bold; }
        .remove-btn { background: #e74c3c; color: white; padding: 5px 8px; }
        .option-group { background: #fff3cd; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 0.85em; border: 1px solid #ffeeba; }
        .total-summary { background: #2c3e50; color: #fff; padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; }
        .total-summary span { font-size: 1.4em; font-weight: bold; color: #f1c40f; }
        .info-panel { margin-top: 15px; padding: 12px; background: #fafafa; border-radius: 8px; border: 1px solid #ddd; }
        .leg-info { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .route-link { display: block; padding: 10px; margin-top: 5px; background: white; border: 2px solid #3498db; color: #3498db; text-decoration: none; border-radius: 6px; font-weight: bold; text-align: center; }
        .dist-label-box { position: absolute; background: #fff; color: #e74c3c; font-weight: bold; font-size: 13px; padding: 4px 10px; border: 2.5px solid #e74c3c; border-radius: 6px; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.25); transform: translate(-50%, -50%); pointer-events: none; z-index: 100; }
        .dist-label-box::after { content: ''; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 7px solid #e74c3c; }
        .parking-status { font-size: 0.8em; color: #7f8c8d; text-align: center; margin-top: 6px; padding: 4px 8px; background: #f8f9fa; border-radius: 4px; display: none; }
        .parking-status.active { display: block; }

        /* 住所検証ステータス */
        .verify-status { font-size: 0.8em; padding: 8px; border-radius: 6px; margin-top: 8px; display: none; }
        .verify-status.active { display: block; }
        .verify-status.checking { background: #fff3cd; color: #856404; }
        .verify-status.ok { background: #d4edda; color: #155724; }
        .verify-status.error { background: #f8d7da; color: #721c24; }
        .verify-item { padding: 4px 0; display: flex; align-items: center; gap: 6px; }
        .verify-item .v-icon { flex-shrink: 0; }

        /* 住所読み取りパネル */
        .reader-toggle-btn { background: linear-gradient(135deg, #8e44ad, #9b59b6); color: white; width: 100%; font-weight: bold; font-size: 0.95em; margin-bottom: 10px; padding: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .reader-toggle-btn:hover { opacity: 0.9; }
        .reader-panel { display: none; background: #f5f0ff; border: 1.5px solid #d5c8f0; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .reader-panel.open { display: block; animation: panelSlide 0.3s ease; }
        @keyframes panelSlide { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .reader-panel .tab-bar { display: flex; gap: 4px; margin-bottom: 10px; }
        .reader-panel .tab-btn { flex: 1; padding: 7px; font-size: 0.8em; font-weight: bold; border-radius: 4px; background: #e8e0f5; color: #6c5b7b; text-align: center; }
        .reader-panel .tab-btn.active { background: #8e44ad; color: white; }
        .reader-panel .tab-content { display: none; }
        .reader-panel .tab-content.active { display: block; }
        .reader-panel textarea { width: 100%; min-height: 80px; padding: 8px; border: 1px solid #d5c8f0; border-radius: 4px; font-size: 0.85em; resize: vertical; font-family: inherit; }
        .image-upload-btns { display: flex; gap: 6px; margin-bottom: 8px; }
        .image-upload-btns button { flex: 1; padding: 10px; font-weight: bold; font-size: 0.85em; }
        .upload-file-btn { background: #8e44ad; color: white; }
        .upload-camera-btn { background: #e67e22; color: white; }
        .image-drop-zone { border: 2px dashed #c0a8e0; border-radius: 8px; padding: 15px; text-align: center; color: #8e44ad; font-size: 0.82em; cursor: pointer; transition: 0.2s; background: #faf7ff; }
        .image-drop-zone.dragover { background: #ede3ff; border-color: #8e44ad; }
        .image-thumbs { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .image-thumb { position: relative; width: 70px; height: 70px; border-radius: 6px; overflow: hidden; border: 2px solid #d5c8f0; }
        .image-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .image-thumb .thumb-remove { position: absolute; top: 1px; right: 1px; background: rgba(231,76,60,0.9); color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
        .image-thumb-count { font-size: 0.75em; color: #8e44ad; text-align: center; }
        .extract-btn { background: #8e44ad; color: white; width: 100%; font-weight: bold; margin-top: 8px; padding: 10px; }
        .extract-btn:disabled { background: #bbb; cursor: not-allowed; }
        .ocr-progress { margin-top: 8px; display: none; }
        .ocr-progress.active { display: block; }
        .ocr-progress-bar { height: 6px; background: #e8e0f5; border-radius: 3px; overflow: hidden; }
        .ocr-progress-fill { height: 100%; background: linear-gradient(90deg, #8e44ad, #e74c3c); border-radius: 3px; transition: width 0.3s; width: 0%; }
        .ocr-progress-text { font-size: 0.75em; color: #8e44ad; margin-top: 3px; text-align: center; }
        .ocr-raw-toggle { font-size: 0.75em; color: #8e44ad; cursor: pointer; text-decoration: underline; margin-top: 6px; display: none; text-align: right; }
        .ocr-raw-toggle.active { display: block; }
        .ocr-raw-area { display: none; margin-top: 4px; }
        .ocr-raw-area.open { display: block; }
        .ocr-raw-area textarea { width: 100%; min-height: 120px; font-size: 0.78em; color: #333; background: #f9f7fd; border: 1px solid #e8e0f5; }
        .re-extract-btn { background: #6c5b7b; color: white; width: 100%; font-weight: bold; margin-top: 4px; padding: 8px; font-size: 0.85em; }
        .address-results { margin-top: 10px; }
        .address-results-title { font-size: 0.8em; font-weight: bold; color: #6c5b7b; margin-bottom: 6px; }
        .address-chip { display: flex; align-items: center; gap: 6px; padding: 8px 10px; margin-bottom: 5px; background: white; border: 1.5px solid #d5c8f0; border-radius: 6px; cursor: grab; font-size: 0.85em; transition: 0.2s; user-select: none; }
        .address-chip:hover { border-color: #8e44ad; box-shadow: 0 2px 6px rgba(142,68,173,0.2); }
        .address-chip.selected { background: #8e44ad; color: white; border-color: #8e44ad; }
        .address-chip .chip-icon { font-size: 1em; flex-shrink: 0; }
        .address-chip .chip-sub { font-size: 0.75em; color: #999; }
        .address-chip.selected .chip-sub { color: rgba(255,255,255,0.7); }
        .address-chip .chip-remove { background: none; border: none; color: #999; cursor: pointer; padding: 0 2px; font-size: 1.1em; flex-shrink: 0; }
        .address-chip.selected .chip-remove { color: rgba(255,255,255,0.7); }
        .address-chip.dragging { opacity: 0.5; }
        .address-input.drop-highlight { outline: 3px solid #8e44ad !important; outline-offset: -1px; background: #f5f0ff !important; }
        .chip-hint { font-size: 0.72em; color: #999; text-align: center; margin-top: 4px; }
        .url-input-row { display: flex; gap: 4px; margin-bottom: 6px; }
        .url-input-row input { flex: 1; font-size: 0.85em; }
        .url-fetch-btn { background: #8e44ad; color: white; font-size: 0.8em; font-weight: bold; white-space: nowrap; padding: 8px 12px; }
        #preprocess-canvas { display: none; }
        .hidden-file-input { display: none; }
    </style>
</head>
<body>
<header>営業ルートナビ（視認性強化版 v2）</header>
<div id="main-container">
    <div id="sidebar">
        <div id="total-display" class="total-summary" style="display:none;">
            総移動距離: <span id="total-km">0.0</span> km
        </div>

        <button class="reader-toggle-btn" onclick="toggleReaderPanel()">📷 住所読み取り（画像・テキスト）<span id="reader-arrow">▼</span></button>
        <div id="reader-panel" class="reader-panel">
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('image',this)">📷 画像OCR</button>
                <button class="tab-btn" onclick="switchTab('text',this)">📋 テキスト貼付</button>
                <button class="tab-btn" onclick="switchTab('url',this)">🔗 URL読取</button>
            </div>
            <div id="tab-image" class="tab-content active">
                <div class="image-upload-btns">
                    <button class="upload-file-btn" onclick="document.getElementById('file-multi').click()">📁 ファイルを選択</button>
                    <button class="upload-camera-btn" onclick="document.getElementById('file-camera').click()">📷 カメラで撮影</button>
                </div>
                <input type="file" id="file-multi" class="hidden-file-input" accept="image/*" multiple onchange="handleFiles(event)">
                <input type="file" id="file-camera" class="hidden-file-input" accept="image/*" capture="environment" onchange="handleFiles(event)">
                <div class="image-drop-zone" id="drop-zone">ここに画像をドラッグ＆ドロップ（複数可）</div>
                <div class="image-thumbs" id="thumbs"></div>
                <div class="image-thumb-count" id="thumb-count"></div>
                <button class="extract-btn" id="ocr-btn" onclick="runAllOCR()" disabled>🔍 住所を読み取る</button>
                <div class="ocr-progress" id="ocr-progress">
                    <div class="ocr-progress-bar"><div class="ocr-progress-fill" id="ocr-fill"></div></div>
                    <div class="ocr-progress-text" id="ocr-text">準備中...</div>
                </div>
                <div class="ocr-raw-toggle" id="ocr-toggle" onclick="toggleRaw()">▶ 認識テキストを確認・編集</div>
                <div class="ocr-raw-area" id="ocr-raw-area">
                    <textarea id="ocr-raw"></textarea>
                    <button class="re-extract-btn" onclick="reExtract()">🔄 編集テキストから再抽出</button>
                </div>
            </div>
            <div id="tab-text" class="tab-content">
                <textarea id="text-input" placeholder="住所を含むテキストを貼り付け&#10;例: 住所（行政区・町）中村区亀島一丁目2番4号"></textarea>
                <button class="extract-btn" onclick="extractFromText()">🔍 住所を抽出する</button>
            </div>
            <div id="tab-url" class="tab-content">
                <div class="url-input-row"><input type="text" id="url-input" placeholder="https://..."><button class="url-fetch-btn" onclick="fetchURL()">取得</button></div>
                <textarea id="url-result" placeholder="取得結果" readonly style="min-height:60px;"></textarea>
                <button class="extract-btn" onclick="extractFromURL()">🔍 住所を抽出する</button>
            </div>
            <div class="address-results" id="addr-results" style="display:none;">
                <div class="address-results-title">📍 抽出された住所候補 <span id="addr-count"></span></div>
                <div id="addr-chips"></div>
                <div class="chip-hint">💡 PC: ドラッグ＆ドロップ ／ スマホ: タップ選択→入力欄タップ</div>
            </div>
        </div>

        <div class="section-title">START</div>
        <div class="input-group special">
            <span class="input-label">現在地</span>
            <input type="text" id="start-point" class="address-input" placeholder="住所または施設名" onchange="saveData()">
            <button class="remove-btn" onclick="clearVal('start-point')">×</button>
            <button class="search-btn" onclick="openGM('start-point')">🔍</button>
            <button id="gps-btn" class="location-btn" onclick="getGPS()">GPS</button>
        </div>
        <div class="section-title">WAYPOINTS</div>
        <div id="waypoint-inputs"></div>
        <button class="primary-btn" onclick="addWP()">＋ 経由地を追加</button>
        <div class="section-title">GOAL</div>
        <div class="input-group special">
            <span class="input-label">目的地</span>
            <input type="text" id="end-point" class="address-input" placeholder="最後に行く場所" onchange="saveData()">
            <button class="remove-btn" onclick="clearVal('end-point')">×</button>
            <button class="search-btn" onclick="openGM('end-point')">🔍</button>
        </div>
        <div class="option-group">
            <div style="margin-bottom:8px;display:flex;align-items:center;gap:10px;">
                <span class="input-label" style="width:auto;">移動手段:</span>
                <select id="travel-mode" onchange="saveData()">
                    <option value="DRIVING">自動車</option><option value="WALKING">徒歩</option>
                    <option value="BICYCLING">自転車</option><option value="TRANSIT">電車・バス</option>
                </select>
            </div>
            <div>
                <label><input type="checkbox" id="avoid-highways" onchange="saveData()"> 高速回避</label>
                <label style="margin-left:10px;"><input type="checkbox" id="avoid-tolls" onchange="saveData()"> 有料道回避</label>
            </div>
        </div>
        <button class="go-btn" onclick="calcRoute()">ルートを表示 ＆ 駐車場検索</button>
        <!-- 住所検証ステータス -->
        <div class="verify-status" id="verify-status"></div>
        <div class="parking-status" id="parking-status"></div>
        <div id="info" class="info-panel"></div>
    </div>
    <div id="map"></div>
</div>
<canvas id="preprocess-canvas"></canvas>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCIj6xwk9pkWn9YbiAymzFt04AG_XrmC40&libraries=places&callback=initMap" async defer></script>
<script>
let map, dirSvc, dirRen, infoWin, geocoder;
let markers=[], overlays=[];
let selectedChip=null, DistLabel=null;
let uploadedImgs=[];

/* === 初期化 === */
function initMap(){
    dirSvc=new google.maps.DirectionsService();
    dirRen=new google.maps.DirectionsRenderer({suppressMarkers:true});
    infoWin=new google.maps.InfoWindow();
    geocoder=new google.maps.Geocoder();
    map=new google.maps.Map(document.getElementById('map'),{zoom:13,center:{lat:35.1815,lng:136.9066}});
    dirRen.setMap(map);
    DistLabel=class extends google.maps.OverlayView{
        constructor(p,t){super();this.pos=p;this.txt=t;this.div=null;}
        onAdd(){this.div=document.createElement('div');this.div.className='dist-label-box';this.div.textContent=this.txt;this.getPanes().overlayLayer.appendChild(this.div);}
        draw(){const pr=this.getProjection();if(!pr||!this.div)return;const p=pr.fromLatLngToDivPixel(this.pos);if(p){this.div.style.left=p.x+'px';this.div.style.top=p.y+'px';}}
        onRemove(){if(this.div&&this.div.parentNode)this.div.parentNode.removeChild(this.div);}
    };
    loadData(); setupDrop();
}

/* === 基本 === */
function clearVal(id){document.getElementById(id).value='';saveData();}
function openGM(id){const v=document.getElementById(id).value;if(v)window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(v)}`,'_blank');}
function openGME(el){const v=el.parentElement.querySelector('input').value;if(v)window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(v)}`,'_blank');}
function getGPS(){
    const b=document.getElementById('gps-btn');if(!navigator.geolocation)return;b.innerText="中...";
    navigator.geolocation.getCurrentPosition(p=>{
        geocoder.geocode({location:{lat:p.coords.latitude,lng:p.coords.longitude}},(r,s)=>{
            if(s==="OK"&&r[0]){document.getElementById('start-point').value=r[0].formatted_address;saveData();}b.innerText="GPS";
        });
    },()=>{b.innerText="GPS";},{enableHighAccuracy:true,timeout:10000});
}
function addWP(v=''){
    const c=document.getElementById('waypoint-inputs'),d=document.createElement('div');d.className='input-group';
    d.innerHTML=`<span class="input-label"></span><input type="text" class="waypoint-input address-input" placeholder="住所または施設名" value="${v}" onchange="saveData()"><button class="search-btn" onclick="openGME(this)">🔍</button><button class="remove-btn" onclick="this.parentElement.remove();reLabel();saveData();">×</button>`;
    c.appendChild(d);reLabel();setupDrop();
}
function reLabel(){document.querySelectorAll('.waypoint-input').forEach((e,i)=>{e.previousElementSibling.innerText=`地点 ${String.fromCharCode(65+i)}`;});}

/* === ルート計算（住所検証付き） === */
async function calcRoute(){
    markers.forEach(m=>m.setMap(null));markers=[];
    overlays.forEach(o=>o.setMap(null));overlays=[];

    const start=document.getElementById('start-point').value;
    const end=document.getElementById('end-point').value;
    const mode=document.getElementById('travel-mode').value;
    const wpVals=Array.from(document.querySelectorAll('.waypoint-input')).map(i=>i.value).filter(v=>v);
    if(!start||!end)return alert('現在地と目的地を入力してください');

    // === 住所をジオコードで事前検証 ===
    const allAddrs=[{label:'現在地',val:start},{label:'目的地',val:end},...wpVals.map((v,i)=>({label:`地点${String.fromCharCode(65+i)}`,val:v}))];
    const vStatus=document.getElementById('verify-status');
    vStatus.className='verify-status active checking';
    vStatus.innerHTML='🔍 住所を検証中...';

    const verified=[];
    let hasError=false;

    for(const item of allAddrs){
        const result=await geocodeAddress(item.val);
        if(result.ok){
            verified.push({label:item.label,original:item.val,resolved:result.address,latLng:result.latLng});
        }else{
            hasError=true;
            verified.push({label:item.label,original:item.val,resolved:null,error:true});
        }
    }

    if(hasError){
        let html='<strong>⚠️ 一部の住所が見つかりませんでした</strong><br><span style="font-size:0.8em;">入力欄を修正して再実行してください</span><hr>';
        verified.forEach(v=>{
            if(v.error){
                html+=`<div class="verify-item"><span class="v-icon">❌</span><strong>${v.label}:</strong> <span style="color:#c0392b;">${v.original}</span></div>`;
            }else{
                html+=`<div class="verify-item"><span class="v-icon">✅</span><strong>${v.label}:</strong> ${v.resolved}</div>`;
            }
        });
        vStatus.className='verify-status active error';
        vStatus.innerHTML=html;
        return;
    }

    // 検証OK → 検証済み住所でルート計算
    vStatus.className='verify-status active ok';
    vStatus.innerHTML='✅ 全住所の検証OK → ルート計算中...';

    const resolvedStart=verified[0].resolved;
    const resolvedEnd=verified[1].resolved;
    const resolvedWPs=verified.slice(2).map(v=>v.resolved);

    if(mode==="TRANSIT"&&resolvedWPs.length>0)alert("電車モードは経由地に非対応です。");

    updateParkingStatus("searching");
    let pTotal=0,pRemain=0;

    dirSvc.route({
        origin:resolvedStart, destination:resolvedEnd,
        waypoints:mode==="TRANSIT"?[]:resolvedWPs.map(l=>({location:l,stopover:true})),
        travelMode:google.maps.TravelMode[mode],
        avoidHighways:document.getElementById('avoid-highways').checked,
        avoidTolls:document.getElementById('avoid-tolls').checked,
        optimizeWaypoints:false
    },(resp,status)=>{
        if(status!=='OK'){
            vStatus.className='verify-status active error';
            vStatus.innerHTML=`❌ ルート計算失敗: ${status}<br><span style="font-size:0.8em;">住所間のルートが見つかりません。移動手段を変えるか住所を修正してください。</span>`;
            return;
        }
        vStatus.className='verify-status active ok';
        let vHtml='✅ ルート計算成功！<div style="font-size:0.75em;color:#666;margin-top:4px;">';
        verified.forEach(v=>{vHtml+=`${v.label}: ${v.resolved}<br>`;});
        vHtml+='</div>';
        vStatus.innerHTML=vHtml;
        setTimeout(()=>{vStatus.classList.remove('active');},5000);

        dirRen.setDirections(resp);
        const legs=resp.routes[0].legs;
        let totalM=0;
        addMarker(legs[0].start_location,"現","#e74c3c",resolvedStart);
        legs.forEach((leg,i)=>{
            totalM+=leg.distance.value;
            const o=new DistLabel(leg.steps[Math.floor(leg.steps.length/2)].start_location,leg.distance.text);o.setMap(map);overlays.push(o);
            if(i<legs.length-1){
                addMarker(leg.end_location,String.fromCharCode(65+i),"#3498db",resolvedWPs[i]);
                pRemain++;searchP(leg.end_location,c=>{pTotal+=c;if(--pRemain===0)updateParkingStatus("done",pTotal);});
            }
        });
        addMarker(legs[legs.length-1].end_location,"目","#27ae60",resolvedEnd);
        pRemain++;searchP(legs[legs.length-1].end_location,c=>{pTotal+=c;if(--pRemain===0)updateParkingStatus("done",pTotal);});
        document.getElementById('total-display').style.display='block';
        document.getElementById('total-km').innerText=(totalM/1000).toFixed(1);
        showNav(legs,resolvedStart,resolvedEnd,resolvedWPs,mode);
    });
}

function geocodeAddress(address){
    return new Promise(resolve=>{
        geocoder.geocode({address:address},(results,status)=>{
            if(status==='OK'&&results[0]){
                resolve({ok:true,address:results[0].formatted_address,latLng:results[0].geometry.location});
            }else{
                resolve({ok:false});
            }
        });
    });
}

function addMarker(pos,label,color,addr){
    const m=new google.maps.Marker({position:pos,map,label:{text:label,color:"white",fontWeight:"bold"},icon:{path:google.maps.SymbolPath.CIRCLE,fillColor:color,fillOpacity:1,strokeColor:"white",strokeWeight:2,scale:15}});
    m.addListener('click',()=>{infoWin.setContent(`<div><strong>${label}</strong><br>${addr}<br><a style="color:#3498db;cursor:pointer;" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr)}','_blank')">Googleマップで表示</a></div>`);infoWin.open(map,m);});
    markers.push(m);
}

/* 駐車場 */
function updateParkingStatus(s,c){const e=document.getElementById('parking-status');e.classList.add('active');if(s==="searching"){e.innerHTML="🔍 駐車場検索中...";e.style.color="#e67e22";}else{e.innerHTML=c>0?`🅿️ ${c}件の駐車場`:"⚠️ 駐車場なし";e.style.color=c>0?"#27ae60":"#e74c3c";setTimeout(()=>e.style.color="#7f8c8d",3000);}}
function searchP(pos,cb){
    const svc=new google.maps.places.PlacesService(map);
    svc.nearbySearch({location:pos,radius:500,type:'parking'},(r1,s1)=>{
        const f=s1===google.maps.places.PlacesServiceStatus.OK?r1:[];let n=addPM(f);
        svc.nearbySearch({location:pos,radius:500,keyword:'駐車場 コインパーキング'},(r2,s2)=>{
            const ids=new Set(f.map(r=>r.place_id));
            n+=addPM((s2===google.maps.places.PlacesServiceStatus.OK?r2:[]).filter(r=>!ids.has(r.place_id)));cb(n);
        });
    });
}
function addPM(r){if(!r||!r.length)return 0;r.forEach(p=>{const m=new google.maps.Marker({map,position:p.geometry.location,label:{text:"P",color:"white",fontSize:"10px",fontWeight:"bold"},icon:{path:google.maps.SymbolPath.CIRCLE,fillColor:"#34495e",fillOpacity:0.85,scale:10,strokeColor:"white",strokeWeight:1.5}});m.addListener('click',()=>{infoWin.setContent(`<div><strong>🅿️ ${p.name}</strong><br>${p.vicinity||''}<br>評価: ${p.rating?p.rating+'⭐':'---'}</div>`);infoWin.open(map,m);});markers.push(m);});return r.length;}
function showNav(legs,start,end,wp,mode){
    const labels=["現",...wp.map((_,i)=>String.fromCharCode(65+i)),"目"],vals=[start,...wp,end];
    const mm={DRIVING:"driving",WALKING:"walking",BICYCLING:"bicycling",TRANSIT:"transit"}[mode];
    let h="<strong>🗺️ ナビ・詳細データ</strong><hr>";
    legs.forEach((l,i)=>{h+=`<div class="leg-info"><div style="font-size:0.9em;font-weight:bold;">${labels[i]} → ${labels[i+1]}</div><div style="font-size:0.85em;color:#e67e22;font-weight:bold;">${l.distance.text} (${l.duration.text})</div><a href="https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(vals[i])}&destination=${encodeURIComponent(vals[i+1])}&travelmode=${mm}" target="_blank" class="route-link">🚗 ナビ開始</a></div>`;});
    document.getElementById('info').innerHTML=h;
}

function handleFiles(e){Array.from(e.target.files).forEach(f=>{if(!f.type.startsWith('image/'))return;const r=new FileReader();r.onload=ev=>{uploadedImgs.push({dataURL:ev.target.result});renderThumbs();document.getElementById('ocr-btn').disabled=false;};r.readAsDataURL(f);});e.target.value='';}

/* 画像前処理 */
function preprocess(dataURL){
    return new Promise(res=>{
        const img=new Image();img.onload=()=>{
            const cv=document.getElementById('preprocess-canvas'),ctx=cv.getContext('2d');
            const sc=Math.min(2,4000/Math.max(img.width,img.height));
            cv.width=img.width*sc;cv.height=img.height*sc;
            ctx.drawImage(img,0,0,cv.width,cv.height);
            const id=ctx.getImageData(0,0,cv.width,cv.height),d=id.data;
            for(let i=0;i<d.length;i+=4){let g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];g=((g-128)*1.6)+128+10;g=Math.max(0,Math.min(255,g));if(g>180)g=255;else if(g<80)g=0;d[i]=d[i+1]=d[i+2]=g;}
            ctx.putImageData(id,0,0);res(cv.toDataURL('image/png'));
        };img.src=dataURL;
    });
}

/* Tesseract */
let tessLoaded=false;
async function loadTess(){if(tessLoaded||window.Tesseract){tessLoaded=true;return;}return new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js';s.onload=()=>{tessLoaded=true;res();};s.onerror=()=>rej(new Error('Tesseract読込失敗'));document.head.appendChild(s);});}

async function runAllOCR(){
    if(!uploadedImgs.length)return;
    const fill=document.getElementById('ocr-fill'),txt=document.getElementById('ocr-text'),prog=document.getElementById('ocr-progress'),btn=document.getElementById('ocr-btn');
    btn.disabled=true;prog.classList.add('active');fill.style.width='5%';txt.textContent='OCRエンジン読込中...';
    try{
        await loadTess();fill.style.width='10%';txt.textContent='言語データ準備中...';
        const w=await Tesseract.createWorker({logger:m=>{if(m.status==='loading language traineddata')txt.textContent='言語データDL中...';}});
        await w.loadLanguage('jpn+eng');await w.initialize('jpn+eng');
        await w.setParameters({tessedit_pageseg_mode:'6'});
        let allText='';const total=uploadedImgs.length;
        for(let i=0;i<total;i++){
            fill.style.width=(15+(i/total)*80)+'%';txt.textContent=`画像${i+1}/${total} 前処理中...`;
            const pp=await preprocess(uploadedImgs[i].dataURL);
            txt.textContent=`画像${i+1}/${total} 認識中...`;
            const{data:{text}}=await w.recognize(pp);
            allText+=`\n--- 画像${i+1} ---\n`+text;
        }
        await w.terminate();
        fill.style.width='98%';txt.textContent='正規化＆住所抽出中...';
        const norm=normalizeOCR(allText);
        document.getElementById('ocr-raw').value=norm;
        document.getElementById('ocr-toggle').classList.add('active');
        const addrs=extractAddresses(norm);
        displayChips(addrs);
        if(!addrs.length){document.getElementById('ocr-raw-area').classList.add('open');document.getElementById('ocr-toggle').textContent='▼ 認識テキストを閉じる';}
        fill.style.width='100%';txt.textContent=`完了！ ${addrs.length}件検出`;
        setTimeout(()=>{prog.classList.remove('active');btn.disabled=false;},1500);
    }catch(err){txt.textContent='エラー: '+err.message;fill.style.width='0%';btn.disabled=false;}
}

/* === OCRテキスト正規化 === */
function normalizeOCR(text){
    let t=text;
    // 丸囲み数字→半角
    const cir='①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳';
    for(let i=0;i<cir.length;i++)t=t.replaceAll(cir[i],String(i+1));
    // 全角→半角
    t=t.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
    t=t.replace(/[Ａ-Ｚａ-ｚ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
    t=t.replace(/[－ー―‐–—﹣−〜~]/g,'-');
    t=t.replace(/　/g,' ');
    // OCR誤字補正
    t=t.replace(/行\s*政\s*反/g,'行政区');
    t=t.replace(/作\s*業\s*反\s*分/g,'作業区分');
    t=t.replace(/行政区[・\s]*灰/g,'行政区・町');
    t=t.replace(/作\s*楚/g,'作業');t=t.replace(/炸\s*業/g,'作業');
    t=t.replace(/予\s*定\s*月\s*時/g,'予定日時');
    t=t.replace(/建\s*物\s*[・]\s*[槍榮棒]/g,'建物・棟');t=t.replace(/琴\s*物/g,'建物');
    t=t.replace(/狂\s*況/g,'状況');t=t.replace(/出\s*弾/g,'出張');
    t=t.replace(/名\s*茂/g,'名称');t=t.replace(/開\s*柳/g,'開栓');
    // カタカナ住所の典型的誤認識パターン
    t=t.replace(/オイアキチコウ/g,'オオアキチョウ');
    t=t.replace(/ジユウオウチヨウ/g,'ジュウオウチョウ');
    t=t.replace(/ジュウオウチヨウ/g,'ジュウオウチョウ');
    t=t.replace(/中村友/g,'中村区');
    // 日本語文字間スペース除去
    for(let i=0;i<4;i++)t=t.replace(/([\u3000-\u9fff\u30A0-\u30FF])\s+([\u3000-\u9fff\u30A0-\u30FF])/g,'$1$2');
    // 数字間スペース除去
    t=t.replace(/(\d)\s+(\d)/g,'$1$2');
    return t;
}

/* === 住所抽出（キーワードベース） === */
function extractAddresses(rawText){
    const text=normalizeOCR(rawText);
    const lines=text.split(/[\n\r]+/);
    const results=[];
    // 建物情報収集
    const bldgs={};
    lines.forEach((line,idx)=>{
        const m=line.match(/建物[・\s]*棟[・\s]*号室\s*(.*)/);
        if(m&&m[1].trim().length>1){const b=m[1].trim().replace(/^[\s:：]+/,'');if(!/^(?:あり|なし)$/.test(b))bldgs[idx]=b;}
    });

    // ★ 最優先: 「住所」キーワード行
    lines.forEach((line,idx)=>{
        if(!/住所|行政区/.test(line))return;
        let addr=line;
        addr=addr.replace(/^.*?住所\s*[\(（][^)）]*[\)）]\s*/,'');
        addr=addr.replace(/^.*?住所\s*/,'');
        addr=addr.replace(/^.*?行政区[・\s]*[町区]\s*[\)）]?\s*/,'');
        addr=cleanAddr(addr);
        if(addr.length>=4&&/[区市町村]|丁目|\d/.test(addr)){
            const bld=bldgs[idx+1]||bldgs[idx+2]||null;
            // 住所に「名古屋市」を自動付加（XX区始まりの場合）
            const fullAddr=prependCity(addr);
            results.push({address:fullAddr,building:bld});
        }
    });

    // フォールバック
    if(!results.length){
        lines.forEach((line,idx)=>{
            const pats=[
                /([^\s,。]{1,5}区[^\s,。]{1,20}(?:\d[-\d]+|丁目[^\s,。]{0,15}))/g,
                /([^\s,。]{1,5}区\s*[ァ-ヴー]{2,15}\s*\d[-\d]*)/g,
            ];
            pats.forEach(p=>{let m;while((m=p.exec(line))!==null){
                const a=cleanAddr(m[1]);
                if(a.length>=5){results.push({address:prependCity(a),building:bldgs[idx+1]||null});}
            }});
        });
    }

    // 重複除去
    const uniq=[];
    results.forEach(item=>{if(!uniq.some(u=>u.address===item.address||u.address.includes(item.address))){
        for(let i=uniq.length-1;i>=0;i--)if(item.address.includes(uniq[i].address))uniq.splice(i,1);
        uniq.push(item);
    }});
    return uniq;
}

function cleanAddr(s){
    if(!s)return'';
    return s.trim()
        .replace(/\s+/g,' ')
        .replace(/^[、。,.\s:：]+/,'')
        // 末尾の英字・記号ゴミ除去（住所に続くOCRノイズ）
        .replace(/\s*[a-zA-Z\s]{1,10}$/, '')
        .replace(/\s*[諒談謀鷺璽縄藁誰嚢撃童].*$/, '')
        .replace(/\s*(?:特記|使用場所|作業|出張|進捗|PM|建物|オーダー).*$/i,'')
        .replace(/[、。,.\s]+$/,'')
        .trim();
}

function prependCity(addr){
    // 「中村区...」→「名古屋市中村区...」（Google Maps認識率向上）
    if(/^[^\s]{1,4}区/.test(addr)&&!/市/.test(addr)){
        return '名古屋市' + addr;
    }
    return addr;
}

function toggleRaw(){const a=document.getElementById('ocr-raw-area');a.classList.toggle('open');document.getElementById('ocr-toggle').textContent=a.classList.contains('open')?'▼ 閉じる':'▶ 認識テキストを確認・編集';}
function reExtract(){const t=document.getElementById('ocr-raw').value;if(t.trim())displayChips(extractAddresses(t));}
function extractFromText(){const t=document.getElementById('text-input').value;if(t.trim())displayChips(extractAddresses(t));}
async function fetchURL(){const u=document.getElementById('url-input').value.trim();if(!u)return;const a=document.getElementById('url-result');a.value='取得中...';try{const r=await fetch(u);const d=new DOMParser().parseFromString(await r.text(),'text/html');a.value=(d.body?d.body.innerText:'').substring(0,5000);}catch(e){a.value='エラー。テキスト貼付タブをご利用ください。';}}
function extractFromURL(){const t=document.getElementById('url-result').value;if(t.trim())displayChips(extractAddresses(t));}

/* === チップ表示 === */
function displayChips(addrs){
    const c=document.getElementById('addr-chips'),w=document.getElementById('addr-results'),cnt=document.getElementById('addr-count');
    if(!addrs.length){w.style.display='block';c.innerHTML='<div style="color:#999;font-size:0.85em;text-align:center;padding:10px;">住所が見つかりません。認識テキストを編集して再抽出してください。</div>';cnt.textContent='';return;}
    w.style.display='block';cnt.textContent=`(${addrs.length}件)`;c.innerHTML='';
    addrs.forEach(item=>{
        const full=item.building?item.address+' '+item.building:item.address;
        const chip=document.createElement('div');chip.className='address-chip';chip.draggable=true;chip.dataset.address=full;
        const sub=item.building?`<div class="chip-sub">🏢 ${item.building}</div>`:'';
        chip.innerHTML=`<span class="chip-icon">📍</span><div style="flex:1;min-width:0;"><span class="chip-text">${item.address}</span>${sub}</div><button class="chip-remove" onclick="event.stopPropagation();this.closest('.address-chip').remove();">×</button>`;
        chip.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',full);chip.classList.add('dragging');hlDrop(true);});
        chip.addEventListener('dragend',()=>{chip.classList.remove('dragging');hlDrop(false);});
        chip.addEventListener('click',e=>{if(e.target.classList.contains('chip-remove'))return;document.querySelectorAll('.address-chip.selected').forEach(c=>c.classList.remove('selected'));if(selectedChip===full){selectedChip=null;}else{selectedChip=full;chip.classList.add('selected');}});
        c.appendChild(chip);
    });
}

/* ドロップ */
function setupDrop(){
    document.querySelectorAll('.address-input').forEach(inp=>{
        if(inp.dataset.dr)return;inp.dataset.dr='1';
        inp.addEventListener('dragover',e=>{e.preventDefault();inp.classList.add('drop-highlight');});
        inp.addEventListener('dragleave',()=>inp.classList.remove('drop-highlight'));
        inp.addEventListener('drop',e=>{e.preventDefault();inp.classList.remove('drop-highlight');const a=e.dataTransfer.getData('text/plain');if(a){inp.value=a;saveData();flash(inp);}});
        inp.addEventListener('click',()=>{if(selectedChip){inp.value=selectedChip;saveData();flash(inp);document.querySelectorAll('.address-chip.selected').forEach(c=>c.classList.remove('selected'));selectedChip=null;}});
    });
}
function hlDrop(on){document.querySelectorAll('.address-input').forEach(i=>{if(on)i.classList.add('drop-highlight');else i.classList.remove('drop-highlight');});}
function flash(inp){inp.style.transition='background 0.3s';inp.style.background='#d5f5e3';setTimeout(()=>inp.style.background='',800);}

/* データ保存 */
function saveData(){localStorage.setItem('sales_route_v10',JSON.stringify({start:document.getElementById('start-point').value,end:document.getElementById('end-point').value,waypoints:Array.from(document.querySelectorAll('.waypoint-input')).map(i=>i.value),mode:document.getElementById('travel-mode').value,highways:document.getElementById('avoid-highways').checked,tolls:document.getElementById('avoid-tolls').checked}));}
function loadData(){
    let s=JSON.parse(localStorage.getItem('sales_route_v10')||"{}");
    if(!s.start&&!s.end){const o=JSON.parse(localStorage.getItem('sales_route_v9')||"{}");if(o.start||o.end)Object.assign(s,o);}
    document.getElementById('start-point').value=s.start||'';document.getElementById('end-point').value=s.end||'';
    document.getElementById('travel-mode').value=s.mode||'DRIVING';
    document.getElementById('avoid-highways').checked=s.highways||false;document.getElementById('avoid-tolls').checked=s.tolls||false;
    if(s.waypoints&&s.waypoints.length)s.waypoints.forEach(v=>addWP(v));else addWP();
}
