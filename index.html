<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>営業ルート最適化ナビ</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: -apple-system, 'Hiragino Sans', 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; height: 100dvh; background: #f0f2f5; }
        header { background: #2c3e50; color: white; padding: 12px 15px; text-align: center; font-weight: bold; font-size: 1.1em; flex-shrink: 0; }

        /* === PC レイアウト === */
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 400px; padding: 15px; overflow-y: auto; background: #fff; border-right: 1px solid #ddd; -webkit-overflow-scrolling: touch; }
        #map { flex: 1; }

        /* === タブレット（iPad縦持ち等 768-1024px） === */
        @media (max-width: 1024px) and (min-width: 769px) {
            #sidebar { width: 340px; padding: 12px; }
        }

        /* === スマホ / iPad横持ちスプリット不要時（768px以下） === */
        @media (max-width: 768px) {
            #main-container { flex-direction: column; position: relative; }
            #sidebar { width: 100%; flex: 1; order: 2; overflow-y: auto; padding: 12px; }
            #map { width: 100%; order: 1; }
            /* デフォルト: 地図表示、サイドバー非表示 */
            #sidebar { display: none; }
            #map { flex: 1; }
            #sidebar.active-view { display: block; flex: 1; }
            #map.active-view { display: block; flex: 1; }
            #map:not(.active-view) { display: none; }
        }

        /* モバイル切替タブ */
        .mobile-tabs { display: none; background: #2c3e50; }
        @media (max-width: 768px) {
            .mobile-tabs {
                display: flex; flex-shrink: 0;
            }
            .mobile-tabs button {
                flex: 1; padding: 10px; border: none; background: #34495e;
                color: #95a5a6; font-weight: bold; font-size: 0.9em; cursor: pointer;
                transition: 0.2s; border-bottom: 3px solid transparent;
            }
            .mobile-tabs button.active {
                background: #2c3e50; color: white; border-bottom-color: #3498db;
            }
        }

        .section-title { font-size: 0.85em; color: #7f8c8d; margin: 12px 0 5px; font-weight: bold; border-bottom: 1px solid #eee; }
        .input-group { margin-bottom: 8px; background: #fdfdfd; padding: 8px; border-radius: 8px; border: 1px solid #eee; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .input-group.special { background: #e8f4fd; border-color: #3498db; }
        .input-label { font-weight: bold; color: #2c3e50; width: 55px; font-size: 0.85em; flex-shrink: 0; }
        input, select { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; min-width: 0; }
        button { cursor: pointer; padding: 8px; border: none; border-radius: 6px; transition: 0.2s; flex-shrink: 0; }

        /* ボタンをタッチしやすく */
        .primary-btn { background: #3498db; color: white; width: 100%; font-weight: bold; margin-top: 10px; padding: 12px; font-size: 0.95em; }
        .go-btn { background: #27ae60; color: white; width: 100%; font-size: 1.1em; font-weight: bold; margin-top: 15px; height: 54px; border-radius: 10px; }
        .location-btn { background: #e67e22; color: white; font-size: 0.75em; font-weight: bold; min-width: 40px; min-height: 36px; }
        .search-btn { background: #f1c40f; color: #2c3e50; font-size: 0.85em; font-weight: bold; min-width: 36px; min-height: 36px; }
        .remove-btn { background: #e74c3c; color: white; padding: 6px 10px; min-height: 36px; }

        /* 音声入力ボタン */
        .voice-btn {
            background: #9b59b6; color: white; font-size: 1em;
            min-width: 40px; min-height: 36px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; padding: 0; position: relative;
        }
        .voice-btn.recording {
            background: #e74c3c;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); }
            50% { box-shadow: 0 0 0 10px rgba(231,76,60,0); }
        }
        .voice-btn.unsupported { background: #bbb; cursor: not-allowed; }

        .option-group { background: #fff3cd; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.85em; border: 1px solid #ffeeba; }
        .total-summary { background: #2c3e50; color: #fff; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .total-summary span { font-size: 1.4em; font-weight: bold; color: #f1c40f; }
        .info-panel { margin-top: 15px; padding: 12px; background: #fafafa; border-radius: 8px; border: 1px solid #ddd; }
        .leg-info { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .route-link { display: block; padding: 12px; margin-top: 5px; background: white; border: 2px solid #3498db; color: #3498db; text-decoration: none; border-radius: 8px; font-weight: bold; text-align: center; font-size: 1em; }

        .dist-label-box { position: absolute; background: #fff; color: #e74c3c; font-weight: bold; font-size: 13px; padding: 4px 10px; border: 2.5px solid #e74c3c; border-radius: 6px; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.25); transform: translate(-50%,-50%); pointer-events: none; z-index: 100; }
        .dist-label-box::after { content:''; position: absolute; bottom:-7px; left:50%; transform:translateX(-50%); border-left:6px solid transparent; border-right:6px solid transparent; border-top:7px solid #e74c3c; }

        .parking-status { font-size: 0.8em; color: #7f8c8d; text-align: center; margin-top: 6px; padding: 4px 8px; background: #f8f9fa; border-radius: 4px; display: none; }
        .parking-status.active { display: block; }
        .verify-status { font-size: 0.8em; padding: 8px; border-radius: 6px; margin-top: 8px; display: none; }
        .verify-status.active { display: block; }
        .verify-status.checking { background: #fff3cd; color: #856404; }
        .verify-status.ok { background: #d4edda; color: #155724; }
        .verify-status.error { background: #f8d7da; color: #721c24; }
        .verify-item { padding: 3px 0; font-size: 0.9em; }

        /* 住所読み取りパネル */
        .reader-toggle-btn { background: linear-gradient(135deg, #8e44ad, #9b59b6); color: white; width: 100%; font-weight: bold; font-size: 0.95em; margin-bottom: 10px; padding: 12px; display: flex; align-items: center; justify-content: center; gap: 6px; border-radius: 10px; }
        .reader-panel { display: none; background: #f5f0ff; border: 1.5px solid #d5c8f0; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .reader-panel.open { display: block; }
        .reader-panel .tab-bar { display: flex; gap: 4px; margin-bottom: 10px; }
        .reader-panel .tab-btn { flex: 1; padding: 8px; font-size: 0.8em; font-weight: bold; border-radius: 6px; background: #e8e0f5; color: #6c5b7b; text-align: center; min-height: 38px; }
        .reader-panel .tab-btn.active { background: #8e44ad; color: white; }
        .reader-panel .tab-content { display: none; }
        .reader-panel .tab-content.active { display: block; }
        .reader-panel textarea { width: 100%; min-height: 80px; padding: 10px; border: 1px solid #d5c8f0; border-radius: 6px; font-size: 0.9em; resize: vertical; font-family: inherit; }
        .image-upload-btns { display: flex; gap: 6px; margin-bottom: 8px; }
        .image-upload-btns button { flex: 1; padding: 12px; font-weight: bold; font-size: 0.85em; min-height: 44px; }
        .upload-file-btn { background: #8e44ad; color: white; }
        .upload-camera-btn { background: #e67e22; color: white; }
        .image-drop-zone { border: 2px dashed #c0a8e0; border-radius: 8px; padding: 15px; text-align: center; color: #8e44ad; font-size: 0.82em; background: #faf7ff; }
        .image-drop-zone.dragover { background: #ede3ff; border-color: #8e44ad; }
        .image-thumbs { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
        .image-thumb { position: relative; width: 70px; height: 70px; border-radius: 6px; overflow: hidden; border: 2px solid #d5c8f0; }
        .image-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .image-thumb .thumb-remove { position: absolute; top:1px; right:1px; background: rgba(231,76,60,0.9); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
        .image-thumb-count { font-size: 0.75em; color: #8e44ad; text-align: center; }
        .extract-btn { background: #8e44ad; color: white; width: 100%; font-weight: bold; margin-top: 8px; padding: 12px; font-size: 0.95em; }
        .extract-btn:disabled { background: #bbb; }
        .ocr-progress { margin-top: 8px; display: none; }
        .ocr-progress.active { display: block; }
        .ocr-progress-bar { height: 6px; background: #e8e0f5; border-radius: 3px; overflow: hidden; }
        .ocr-progress-fill { height: 100%; background: linear-gradient(90deg, #8e44ad, #e74c3c); border-radius: 3px; transition: width 0.3s; width: 0%; }
        .ocr-progress-text { font-size: 0.75em; color: #8e44ad; margin-top: 3px; text-align: center; }
        .ocr-raw-toggle { font-size: 0.75em; color: #8e44ad; cursor: pointer; text-decoration: underline; margin-top: 6px; display: none; text-align: right; }
        .ocr-raw-toggle.active { display: block; }
        .ocr-raw-area { display: none; margin-top: 4px; }
        .ocr-raw-area.open { display: block; }
        .ocr-raw-area textarea { width: 100%; min-height: 120px; font-size: 0.8em; }
        .re-extract-btn { background: #6c5b7b; color: white; width: 100%; font-weight: bold; margin-top: 4px; padding: 10px; }
        .address-results { margin-top: 10px; }
        .address-results-title { font-size: 0.8em; font-weight: bold; color: #6c5b7b; margin-bottom: 6px; }
        .address-chip { display: flex; align-items: center; gap: 6px; padding: 10px; margin-bottom: 5px; background: white; border: 1.5px solid #d5c8f0; border-radius: 8px; cursor: grab; font-size: 0.9em; transition: 0.2s; user-select: none; min-height: 44px; }
        .address-chip:hover { border-color: #8e44ad; }
        .address-chip.selected { background: #8e44ad; color: white; border-color: #8e44ad; }
        .address-chip .chip-icon { font-size: 1em; flex-shrink: 0; }
        .address-chip .chip-sub { font-size: 0.75em; color: #999; }
        .address-chip.selected .chip-sub { color: rgba(255,255,255,0.7); }
        .address-chip .chip-remove { background: none; border: none; color: #999; cursor: pointer; padding: 4px 6px; font-size: 1.2em; flex-shrink: 0; min-width: 30px; min-height: 30px; display: flex; align-items: center; justify-content: center; }
        .address-chip.selected .chip-remove { color: rgba(255,255,255,0.7); }
        .address-chip.dragging { opacity: 0.5; }
        .address-input.drop-highlight { outline: 3px solid #8e44ad !important; background: #f5f0ff !important; }
        .chip-hint { font-size: 0.72em; color: #999; text-align: center; margin-top: 4px; }
        .url-input-row { display: flex; gap: 4px; margin-bottom: 6px; }
        .url-input-row input { flex: 1; }
        .url-fetch-btn { background: #8e44ad; color: white; font-size: 0.85em; font-weight: bold; padding: 10px 14px; }
        #preprocess-canvas { display: none; }
        .hidden-file-input { display: none; }

        /* 音声認識フィードバック */
        .voice-feedback {
            display: none; font-size: 0.8em; color: #8e44ad;
            text-align: center; padding: 6px; margin-top: 4px;
            background: #f5f0ff; border-radius: 6px;
        }
        .voice-feedback.active { display: block; }
    </style>
</head>
<body>
<header>営業ルートナビ（視認性強化版 v2）</header>

<!-- モバイル切替タブ -->
<div class="mobile-tabs" id="mobile-tabs">
    <button class="active" onclick="switchView('map')">🗺️ 地図</button>
    <button onclick="switchView('list')">📋 設定・入力</button>
</div>

<div id="main-container">
    <div id="sidebar">
        <div id="total-display" class="total-summary" style="display:none;">
            総移動距離: <span id="total-km">0.0</span> km
        </div>

        <button class="reader-toggle-btn" onclick="toggleReader()">📷 住所読み取り（画像・テキスト）<span id="reader-arrow">▼</span></button>
        <div id="reader-panel" class="reader-panel">
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('image',this)">📷 画像</button>
                <button class="tab-btn" onclick="switchTab('text',this)">📋 テキスト</button>
                <button class="tab-btn" onclick="switchTab('url',this)">🔗 URL</button>
            </div>
            <div id="tab-image" class="tab-content active">
                <div class="image-upload-btns">
                    <button class="upload-file-btn" onclick="document.getElementById('f-multi').click()">📁 ファイル選択</button>
                    <button class="upload-camera-btn" onclick="document.getElementById('f-camera').click()">📷 カメラ撮影</button>
                </div>
                <input type="file" id="f-multi" class="hidden-file-input" accept="image/*" multiple onchange="handleFiles(event)">
                <input type="file" id="f-camera" class="hidden-file-input" accept="image/*" capture="environment" onchange="handleFiles(event)">
                <div class="image-drop-zone" id="drop-zone">画像をドラッグ＆ドロップ（複数可）</div>
                <div class="image-thumbs" id="thumbs"></div>
                <div class="image-thumb-count" id="thumb-count"></div>
                <button class="extract-btn" id="ocr-btn" onclick="runAllOCR()" disabled>🔍 住所を読み取る</button>
                <div class="ocr-progress" id="ocr-progress"><div class="ocr-progress-bar"><div class="ocr-progress-fill" id="ocr-fill"></div></div><div class="ocr-progress-text" id="ocr-text">準備中...</div></div>
                <div class="ocr-raw-toggle" id="ocr-toggle" onclick="toggleRaw()">▶ 認識テキストを確認</div>
                <div class="ocr-raw-area" id="ocr-raw-area"><textarea id="ocr-raw"></textarea><button class="re-extract-btn" onclick="reExtract()">🔄 再抽出</button></div>
            </div>
            <div id="tab-text" class="tab-content">
                <textarea id="text-input" placeholder="住所を含むテキストを貼り付け"></textarea>
                <button class="extract-btn" onclick="extractText()">🔍 住所を抽出</button>
            </div>
            <div id="tab-url" class="tab-content">
                <div class="url-input-row"><input type="text" id="url-input" placeholder="https://..."><button class="url-fetch-btn" onclick="fetchURL()">取得</button></div>
                <textarea id="url-result" placeholder="取得結果" readonly style="min-height:60px;"></textarea>
                <button class="extract-btn" onclick="extractURL()">🔍 抽出</button>
            </div>
            <div class="address-results" id="addr-results" style="display:none;">
                <div class="address-results-title">📍 住所候補 <span id="addr-count"></span></div>
                <div id="addr-chips"></div>
                <div class="chip-hint">💡 PC: ドラッグ＆ドロップ ／ スマホ: タップ選択→入力欄タップ</div>
            </div>
        </div>

        <div class="section-title">START</div>
        <div class="input-group special">
            <span class="input-label">現在地</span>
            <input type="text" id="start-point" class="address-input" placeholder="住所または施設名" onchange="saveData()">
            <button class="voice-btn" onclick="startVoice('start-point',this)" title="音声入力">🎤</button>
            <button class="remove-btn" onclick="clearVal('start-point')">×</button>
            <button class="search-btn" onclick="openGM('start-point')">🔍</button>
            <button id="gps-btn" class="location-btn" onclick="getGPS()">GPS</button>
        </div>

        <div class="section-title">WAYPOINTS</div>
        <div id="waypoint-inputs"></div>
        <button class="primary-btn" onclick="addWP()">＋ 経由地を追加</button>

        <div class="section-title">GOAL</div>
        <div class="input-group special">
            <span class="input-label">目的地</span>
            <input type="text" id="end-point" class="address-input" placeholder="最後に行く場所" onchange="saveData()">
            <button class="voice-btn" onclick="startVoice('end-point',this)" title="音声入力">🎤</button>
            <button class="remove-btn" onclick="clearVal('end-point')">×</button>
            <button class="search-btn" onclick="openGM('end-point')">🔍</button>
        </div>

        <div class="option-group">
            <div style="margin-bottom:8px;display:flex;align-items:center;gap:10px;">
                <span class="input-label" style="width:auto;">移動手段:</span>
                <select id="travel-mode" onchange="saveData()">
                    <option value="DRIVING">自動車</option><option value="WALKING">徒歩</option>
                    <option value="BICYCLING">自転車</option><option value="TRANSIT">電車・バス</option>
                </select>
            </div>
            <div><label><input type="checkbox" id="avoid-highways" onchange="saveData()"> 高速回避</label><label style="margin-left:10px;"><input type="checkbox" id="avoid-tolls" onchange="saveData()"> 有料道回避</label></div>
        </div>

        <button class="go-btn" onclick="calcRoute()">ルートを表示 ＆ 駐車場検索</button>
        <div class="voice-feedback" id="voice-feedback"></div>
        <div class="verify-status" id="verify-status"></div>
        <div class="parking-status" id="parking-status"></div>
        <div id="info" class="info-panel"></div>
    </div>
    <div id="map" class="active-view"></div>
</div>
<canvas id="preprocess-canvas"></canvas>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCIj6xwk9pkWn9YbiAymzFt04AG_XrmC40&libraries=places&callback=initMap" async defer></script>
<script>
let map,dirSvc,dirRen,infoWin,geocoder;
let markers=[],overlays=[];
let selectedChip=null,DistLabel=null;
let uploadedImgs=[];

/* === モバイル表示切替 === */
function switchView(view){
    const tabs=document.querySelectorAll('.mobile-tabs button');
    const sidebar=document.getElementById('sidebar');
    const mapEl=document.getElementById('map');
    tabs.forEach(t=>t.classList.remove('active'));
    if(view==='map'){
        tabs[0].classList.add('active');
        mapEl.classList.add('active-view');
        sidebar.classList.remove('active-view');
        // 地図リサイズ
        setTimeout(()=>{if(map)google.maps.event.trigger(map,'resize');},100);
    }else{
        tabs[1].classList.add('active');
        sidebar.classList.add('active-view');
        mapEl.classList.remove('active-view');
    }
}

/* === 初期化 === */
function initMap(){
    dirSvc=new google.maps.DirectionsService();
    dirRen=new google.maps.DirectionsRenderer({suppressMarkers:true});
    infoWin=new google.maps.InfoWindow();
    geocoder=new google.maps.Geocoder();
    map=new google.maps.Map(document.getElementById('map'),{zoom:13,center:{lat:35.1815,lng:136.9066},
        mapTypeControl:true,mapTypeControlOptions:{position:google.maps.ControlPosition.TOP_RIGHT},
        fullscreenControl:true,zoomControl:true,streetViewControl:false
    });
    dirRen.setMap(map);
    DistLabel=class extends google.maps.OverlayView{
        constructor(p,t){super();this.pos=p;this.txt=t;this.div=null;}
        onAdd(){this.div=document.createElement('div');this.div.className='dist-label-box';this.div.textContent=this.txt;this.getPanes().overlayLayer.appendChild(this.div);}
        draw(){const pr=this.getProjection();if(!pr||!this.div)return;const p=pr.fromLatLngToDivPixel(this.pos);if(p){this.div.style.left=p.x+'px';this.div.style.top=p.y+'px';}}
        onRemove(){if(this.div&&this.div.parentNode)this.div.parentNode.removeChild(this.div);}
    };
    loadData();setupDrop();checkVoiceSupport();
}

/* === 音声入力 === */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let currentRecognition = null;

function checkVoiceSupport(){
    if(!SpeechRecognition){
        document.querySelectorAll('.voice-btn').forEach(b=>{b.classList.add('unsupported');b.title='このブラウザは音声入力非対応です';});
    }
}

function startVoice(inputId, btn){
    if(!SpeechRecognition){alert('このブラウザは音声入力に対応していません');return;}

    // 既に録音中なら停止
    if(currentRecognition){currentRecognition.stop();currentRecognition=null;btn.classList.remove('recording');return;}

    const recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    const input = document.getElementById(inputId);
    const feedback = document.getElementById('voice-feedback');

    btn.classList.add('recording');
    feedback.className = 'voice-feedback active';
    feedback.textContent = '🎤 音声を聞いています...';
    currentRecognition = recognition;

    recognition.onresult = (e) => {
        let interim = '', final = '';
        for(let i = e.resultIndex; i < e.results.length; i++){
            const transcript = e.results[i][0].transcript;
            if(e.results[i].isFinal){ final += transcript; }
            else { interim += transcript; }
        }
        if(final){
            input.value = final;
            saveData();
            feedback.textContent = `✅ 認識結果: ${final}`;
            setTimeout(()=>feedback.classList.remove('active'),3000);
        }else{
            feedback.textContent = `🎤 ${interim}`;
        }
    };

    recognition.onerror = (e) => {
        let msg = '音声認識エラー';
        if(e.error === 'no-speech') msg = '音声が検出されませんでした';
        else if(e.error === 'not-allowed') msg = 'マイクの使用が許可されていません';
        feedback.textContent = '⚠️ ' + msg;
        setTimeout(()=>feedback.classList.remove('active'),3000);
    };

    recognition.onend = () => {
        btn.classList.remove('recording');
        currentRecognition = null;
    };

    recognition.start();
}

/* 経由地用の音声入力 */
function startVoiceWP(btn){
    const input = btn.parentElement.querySelector('.waypoint-input');
    if(!input)return;
    if(!SpeechRecognition){alert('音声入力非対応');return;}
    if(currentRecognition){currentRecognition.stop();currentRecognition=null;btn.classList.remove('recording');return;}

    const recognition=new SpeechRecognition();
    recognition.lang='ja-JP';recognition.continuous=false;recognition.interimResults=true;
    const feedback=document.getElementById('voice-feedback');
    btn.classList.add('recording');
    feedback.className='voice-feedback active';feedback.textContent='🎤 音声を聞いています...';
    currentRecognition=recognition;

    recognition.onresult=(e)=>{
        let interim='',final='';
        for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)final+=t;else interim+=t;}
        if(final){input.value=final;saveData();feedback.textContent=`✅ ${final}`;setTimeout(()=>feedback.classList.remove('active'),3000);}
        else{feedback.textContent=`🎤 ${interim}`;}
    };
    recognition.onerror=(e)=>{feedback.textContent='⚠️ エラー';setTimeout(()=>feedback.classList.remove('active'),3000);};
    recognition.onend=()=>{btn.classList.remove('recording');currentRecognition=null;};
    recognition.start();
}

/* === ルート計算（住所検証付き） === */
async function calcRoute(){
    markers.forEach(m=>m.setMap(null));markers=[];overlays.forEach(o=>o.setMap(null));overlays=[];
    const start=document.getElementById('start-point').value,end=document.getElementById('end-point').value;
    const mode=document.getElementById('travel-mode').value;
    const wpVals=Array.from(document.querySelectorAll('.waypoint-input')).map(i=>i.value).filter(v=>v);
    if(!start||!end)return alert('現在地と目的地を入力してください');
    const all=[{l:'現在地',v:start},{l:'目的地',v:end},...wpVals.map((v,i)=>({l:`地点${String.fromCharCode(65+i)}`,v}))];
    const vs=document.getElementById('verify-status');
    vs.className='verify-status active checking';vs.innerHTML='🔍 住所を検証中...';
    const verified=[];let hasErr=false;
    for(const item of all){
        const r=await geocodeAddr(item.v);
        if(r.ok)verified.push({...item,resolved:r.address});
        else{hasErr=true;verified.push({...item,resolved:null,err:true});}
    }
    if(hasErr){
        let h='<strong>⚠️ 住所が見つかりません</strong><hr>';
        verified.forEach(v=>{h+=`<div class="verify-item">${v.err?'❌':'✅'} <strong>${v.l}:</strong> ${v.err?`<span style="color:#c0392b">${v.v}</span>`:v.resolved}</div>`;});
        vs.className='verify-status active error';vs.innerHTML=h;return;
    }
    vs.className='verify-status active ok';vs.innerHTML='✅ 検証OK → ルート計算中...';
    const rStart=verified[0].resolved,rEnd=verified[1].resolved,rWPs=verified.slice(2).map(v=>v.resolved);
    if(mode==="TRANSIT"&&rWPs.length>0)alert("電車モードは経由地非対応");
    updatePS("searching");let pT=0,pR=0;
    dirSvc.route({origin:rStart,destination:rEnd,waypoints:mode==="TRANSIT"?[]:rWPs.map(l=>({location:l,stopover:true})),travelMode:google.maps.TravelMode[mode],avoidHighways:document.getElementById('avoid-highways').checked,avoidTolls:document.getElementById('avoid-tolls').checked,optimizeWaypoints:false},(resp,status)=>{
        if(status!=='OK'){vs.className='verify-status active error';vs.innerHTML=`❌ ルート計算失敗: ${status}`;return;}
        vs.className='verify-status active ok';vs.innerHTML='✅ ルート計算成功！';setTimeout(()=>vs.classList.remove('active'),4000);
        dirRen.setDirections(resp);const legs=resp.routes[0].legs;let tM=0;
        addMk(legs[0].start_location,"現","#e74c3c",rStart);
        legs.forEach((leg,i)=>{tM+=leg.distance.value;const o=new DistLabel(leg.steps[Math.floor(leg.steps.length/2)].start_location,leg.distance.text);o.setMap(map);overlays.push(o);
            if(i<legs.length-1){addMk(leg.end_location,String.fromCharCode(65+i),"#3498db",rWPs[i]);pR++;searchP(leg.end_location,c=>{pT+=c;if(--pR===0)updatePS("done",pT);});}
        });
        addMk(legs[legs.length-1].end_location,"目","#27ae60",rEnd);
        pR++;searchP(legs[legs.length-1].end_location,c=>{pT+=c;if(--pR===0)updatePS("done",pT);});
        document.getElementById('total-display').style.display='block';document.getElementById('total-km').innerText=(tM/1000).toFixed(1);
        showNav(legs,rStart,rEnd,rWPs,mode);
        // モバイルで地図に自動切替
        if(window.innerWidth<=768)switchView('map');
    });
}
function geocodeAddr(addr){return new Promise(res=>{geocoder.geocode({address:addr},(r,s)=>{if(s==='OK'&&r[0])res({ok:true,address:r[0].formatted_address});else res({ok:false});});});}
function addMk(pos,label,color,addr){const m=new google.maps.Marker({position:pos,map,label:{text:label,color:"white",fontWeight:"bold"},icon:{path:google.maps.SymbolPath.CIRCLE,fillColor:color,fillOpacity:1,strokeColor:"white",strokeWeight:2,scale:15}});m.addListener('click',()=>{infoWin.setContent(`<div><strong>${label}</strong><br>${addr}<br><a style="color:#3498db;cursor:pointer;" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr)}','_blank')">Googleマップで表示</a></div>`);infoWin.open(map,m);});markers.push(m);}
function updatePS(s,c){const e=document.getElementById('parking-status');e.classList.add('active');if(s==="searching"){e.innerHTML="🔍 駐車場検索中...";e.style.color="#e67e22";}else{e.innerHTML=c>0?`🅿️ ${c}件の駐車場`:"⚠️ 駐車場なし";e.style.color=c>0?"#27ae60":"#e74c3c";setTimeout(()=>e.style.color="#7f8c8d",3000);}}
function searchP(pos,cb){const svc=new google.maps.places.PlacesService(map);svc.nearbySearch({location:pos,radius:500,type:'parking'},(r1,s1)=>{const f=s1===google.maps.places.PlacesServiceStatus.OK?r1:[];let n=addPM(f);svc.nearbySearch({location:pos,radius:500,keyword:'駐車場 コインパーキング'},(r2,s2)=>{const ids=new Set(f.map(r=>r.place_id));n+=addPM((s2===google.maps.places.PlacesServiceStatus.OK?r2:[]).filter(r=>!ids.has(r.place_id)));cb(n);});});}
function addPM(r){if(!r||!r.length)return 0;r.forEach(p=>{const m=new google.maps.Marker({map,position:p.geometry.location,label:{text:"P",color:"white",fontSize:"10px",fontWeight:"bold"},icon:{path:google.maps.SymbolPath.CIRCLE,fillColor:"#34495e",fillOpacity:0.85,scale:10,strokeColor:"white",strokeWeight:1.5}});m.addListener('click',()=>{infoWin.setContent(`<div><strong>🅿️ ${p.name}</strong><br>${p.vicinity||''}</div>`);infoWin.open(map,m);});markers.push(m);});return r.length;}
function showNav(legs,start,end,wp,mode){
    const labels=["現",...wp.map((_,i)=>String.fromCharCode(65+i)),"目"],vals=[start,...wp,end];
    const mm={DRIVING:"driving",WALKING:"walking",BICYCLING:"bicycling",TRANSIT:"transit"}[mode];
    let h="<strong>🗺️ ナビ・詳細データ</strong><hr>";
    legs.forEach((l,i)=>{h+=`<div class="leg-info"><div style="font-weight:bold;">${labels[i]} → ${labels[i+1]}</div><div style="color:#e67e22;font-weight:bold;">${l.distance.text} (${l.duration.text})</div><a href="https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(vals[i])}&destination=${encodeURIComponent(vals[i+1])}&travelmode=${mm}" target="_blank" class="route-link">🚗 ナビ開始</a></div>`;});
    document.getElementById('info').innerHTML=h;
}

/* === 住所読み取り === */
function toggleReader(){const p=document.getElementById('reader-panel');p.classList.toggle('open');document.getElementById('reader-arrow').textContent=p.classList.contains('open')?'▲':'▼';}
function switchTab(t,b){document.querySelectorAll('.reader-panel .tab-content').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.reader-panel .tab-btn').forEach(e=>e.classList.remove('active'));document.getElementById('tab-'+t).classList.add('active');b.classList.add('active');}
function handleFiles(e){Array.from(e.target.files).forEach(f=>{if(!f.type.startsWith('image/'))return;const r=new FileReader();r.onload=ev=>{uploadedImgs.push({dataURL:ev.target.result});renderThumbs();document.getElementById('ocr-btn').disabled=false;};r.readAsDataURL(f);});e.target.value='';}
function removeImg(i){uploadedImgs.splice(i,1);renderThumbs();if(!uploadedImgs.length)document.getElementById('ocr-btn').disabled=true;}
function renderThumbs(){const c=document.getElementById('thumbs');c.innerHTML='';uploadedImgs.forEach((img,i)=>{const d=document.createElement('div');d.className='image-thumb';d.innerHTML=`<img src="${img.dataURL}"><button class="thumb-remove" onclick="removeImg(${i})">×</button>`;c.appendChild(d);});document.getElementById('thumb-count').textContent=uploadedImgs.length?`${uploadedImgs.length}枚選択中`:'';}
document.addEventListener('DOMContentLoaded',()=>{const z=document.getElementById('drop-zone');if(!z)return;z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('dragover');});z.addEventListener('dragleave',()=>z.classList.remove('dragover'));z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('dragover');Array.from(e.dataTransfer.files).forEach(f=>{if(!f.type.startsWith('image/'))return;const r=new FileReader();r.onload=ev=>{uploadedImgs.push({dataURL:ev.target.result});renderThumbs();document.getElementById('ocr-btn').disabled=false;};r.readAsDataURL(f);});});});
function preprocess(dataURL){return new Promise(res=>{const img=new Image();img.onload=()=>{const cv=document.getElementById('preprocess-canvas'),ctx=cv.getContext('2d');const sc=Math.min(2,4000/Math.max(img.width,img.height));cv.width=img.width*sc;cv.height=img.height*sc;ctx.drawImage(img,0,0,cv.width,cv.height);const id=ctx.getImageData(0,0,cv.width,cv.height),d=id.data;for(let i=0;i<d.length;i+=4){let g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];g=((g-128)*1.6)+128+10;g=Math.max(0,Math.min(255,g));if(g>180)g=255;else if(g<80)g=0;d[i]=d[i+1]=d[i+2]=g;}ctx.putImageData(id,0,0);res(cv.toDataURL('image/png'));};img.src=dataURL;});}
let tessLoaded=false;
async function loadTess(){if(tessLoaded||window.Tesseract){tessLoaded=true;return;}return new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js';s.onload=()=>{tessLoaded=true;res();};s.onerror=()=>rej(new Error('Tesseract読込失敗'));document.head.appendChild(s);});}
async function runAllOCR(){
    if(!uploadedImgs.length)return;const fill=document.getElementById('ocr-fill'),txt=document.getElementById('ocr-text'),prog=document.getElementById('ocr-progress'),btn=document.getElementById('ocr-btn');
    btn.disabled=true;prog.classList.add('active');fill.style.width='5%';txt.textContent='OCR読込中...';
    try{await loadTess();fill.style.width='10%';const w=await Tesseract.createWorker({logger:m=>{if(m.status==='loading language traineddata')txt.textContent='言語データDL中...';}});
        await w.loadLanguage('jpn+eng');await w.initialize('jpn+eng');await w.setParameters({tessedit_pageseg_mode:'6'});
        let allText='';const total=uploadedImgs.length;
        for(let i=0;i<total;i++){fill.style.width=(15+(i/total)*80)+'%';txt.textContent=`画像${i+1}/${total} 処理中...`;const pp=await preprocess(uploadedImgs[i].dataURL);const{data:{text}}=await w.recognize(pp);allText+=`\n--- 画像${i+1} ---\n`+text;}
        await w.terminate();fill.style.width='98%';txt.textContent='住所抽出中...';
        const norm=normalizeOCR(allText);document.getElementById('ocr-raw').value=norm;document.getElementById('ocr-toggle').classList.add('active');
        const addrs=extractAddresses(norm);displayChips(addrs);
        if(!addrs.length){document.getElementById('ocr-raw-area').classList.add('open');document.getElementById('ocr-toggle').textContent='▼ 閉じる';}
        fill.style.width='100%';txt.textContent=`完了！${addrs.length}件検出`;setTimeout(()=>{prog.classList.remove('active');btn.disabled=false;},1500);
    }catch(err){txt.textContent='エラー: '+err.message;fill.style.width='0%';btn.disabled=false;}
}
function normalizeOCR(text){let t=text;const cir='①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳';for(let i=0;i<cir.length;i++)t=t.replaceAll(cir[i],String(i+1));t=t.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));t=t.replace(/[Ａ-Ｚａ-ｚ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));t=t.replace(/[－ー―‐–—﹣−〜~]/g,'-');t=t.replace(/　/g,' ');t=t.replace(/行\s*政\s*反/g,'行政区');t=t.replace(/作\s*業\s*反\s*分/g,'作業区分');t=t.replace(/行政区[・\s]*灰/g,'行政区・町');t=t.replace(/作\s*楚/g,'作業');t=t.replace(/炸\s*業/g,'作業');t=t.replace(/予\s*定\s*月\s*時/g,'予定日時');t=t.replace(/建\s*物\s*[・]\s*[槍榮棒]/g,'建物・棟');t=t.replace(/琴\s*物/g,'建物');t=t.replace(/狂\s*況/g,'状況');t=t.replace(/出\s*弾/g,'出張');t=t.replace(/名\s*茂/g,'名称');t=t.replace(/開\s*柳/g,'開栓');t=t.replace(/オイアキチコウ/g,'オオアキチョウ');t=t.replace(/ジユウオウチヨウ/g,'ジュウオウチョウ');t=t.replace(/ジュウオウチヨウ/g,'ジュウオウチョウ');t=t.replace(/中村友/g,'中村区');for(let i=0;i<4;i++)t=t.replace(/([\u3000-\u9fff\u30A0-\u30FF])\s+([\u3000-\u9fff\u30A0-\u30FF])/g,'$1$2');t=t.replace(/(\d)\s+(\d)/g,'$1$2');return t;}
function extractAddresses(rawText){const text=normalizeOCR(rawText),lines=text.split(/[\n\r]+/),results=[];const bldgs={};lines.forEach((l,i)=>{const m=l.match(/建物[・\s]*棟[・\s]*号室\s*(.*)/);if(m&&m[1].trim().length>1){const b=m[1].trim().replace(/^[\s:：]+/,'');if(!/^(?:あり|なし)$/.test(b))bldgs[i]=b;}});
    lines.forEach((l,idx)=>{if(!/住所|行政区/.test(l))return;let a=l;a=a.replace(/^.*?住所\s*[\(（][^)）]*[\)）]\s*/,'');a=a.replace(/^.*?住所\s*/,'');a=a.replace(/^.*?行政区[・\s]*[町区]\s*[\)）]?\s*/,'');a=cleanAddr(a);if(a.length>=4&&/[区市町村]|丁目|\d/.test(a)){results.push({address:prependCity(a),building:bldgs[idx+1]||bldgs[idx+2]||null});}});
    if(!results.length){lines.forEach((l,idx)=>{[/([^\s,。]{1,5}区[^\s,。]{1,20}(?:\d[-\d]+|丁目[^\s,。]{0,15}))/g,/([^\s,。]{1,5}区\s*[ァ-ヴー]{2,15}\s*\d[-\d]*)/g].forEach(p=>{let m;while((m=p.exec(l))!==null){const a=cleanAddr(m[1]);if(a.length>=5)results.push({address:prependCity(a),building:bldgs[idx+1]||null});}});});}
    const uniq=[];results.forEach(item=>{if(!uniq.some(u=>u.address===item.address||u.address.includes(item.address))){for(let i=uniq.length-1;i>=0;i--)if(item.address.includes(uniq[i].address))uniq.splice(i,1);uniq.push(item);}});return uniq;
}
function cleanAddr(s){if(!s)return'';return s.trim().replace(/\s+/g,' ').replace(/^[、。,.\s:：]+/,'').replace(/\s*[a-zA-Z\s]{1,10}$/,'').replace(/\s*[諒談謀鷺璽縄藁誰嚢撃童].*$/,'').replace(/\s*(?:特記|使用場所|作業|出張|進捗|PM|建物|オーダー).*$/i,'').replace(/[、。,.\s]+$/,'').trim();}
function prependCity(addr){if(/^[^\s]{1,4}区/.test(addr)&&!/市/.test(addr))return'名古屋市'+addr;return addr;}
function toggleRaw(){const a=document.getElementById('ocr-raw-area');a.classList.toggle('open');document.getElementById('ocr-toggle').textContent=a.classList.contains('open')?'▼ 閉じる':'▶ 認識テキストを確認';}
function reExtract(){const t=document.getElementById('ocr-raw').value;if(t.trim())displayChips(extractAddresses(t));}
function extractText(){const t=document.getElementById('text-input').value;if(t.trim())displayChips(extractAddresses(t));}
async function fetchURL(){const u=document.getElementById('url-input').value.trim();if(!u)return;const a=document.getElementById('url-result');a.value='取得中...';try{const r=await fetch(u);const d=new DOMParser().parseFromString(await r.text(),'text/html');a.value=(d.body?d.body.innerText:'').substring(0,5000);}catch(e){a.value='エラー。テキスト貼付タブをご利用ください。';}}
function extractURL(){const t=document.getElementById('url-result').value;if(t.trim())displayChips(extractAddresses(t));}
function displayChips(addrs){const c=document.getElementById('addr-chips'),w=document.getElementById('addr-results'),cnt=document.getElementById('addr-count');
    if(!addrs.length){w.style.display='block';c.innerHTML='<div style="color:#999;font-size:0.85em;text-align:center;padding:10px;">住所が見つかりません</div>';cnt.textContent='';return;}
    w.style.display='block';cnt.textContent=`(${addrs.length}件)`;c.innerHTML='';
    addrs.forEach(item=>{const full=item.building?item.address+' '+item.building:item.address;const chip=document.createElement('div');chip.className='address-chip';chip.draggable=true;chip.dataset.address=full;
        const sub=item.building?`<div class="chip-sub">🏢 ${item.building}</div>`:'';
        chip.innerHTML=`<span class="chip-icon">📍</span><div style="flex:1;min-width:0;"><span class="chip-text">${item.address}</span>${sub}</div><button class="chip-remove" onclick="event.stopPropagation();this.closest('.address-chip').remove();">×</button>`;
        chip.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',full);chip.classList.add('dragging');hlDrop(true);});
        chip.addEventListener('dragend',()=>{chip.classList.remove('dragging');hlDrop(false);});
        chip.addEventListener('click',e=>{if(e.target.classList.contains('chip-remove'))return;document.querySelectorAll('.address-chip.selected').forEach(c=>c.classList.remove('selected'));if(selectedChip===full){selectedChip=null;}else{selectedChip=full;chip.classList.add('selected');}});
        c.appendChild(chip);
    });
}
function setupDrop(){document.querySelectorAll('.address-input').forEach(inp=>{if(inp.dataset.dr)return;inp.dataset.dr='1';inp.addEventListener('dragover',e=>{e.preventDefault();inp.classList.add('drop-highlight');});inp.addEventListener('dragleave',()=>inp.classList.remove('drop-highlight'));inp.addEventListener('drop',e=>{e.preventDefault();inp.classList.remove('drop-highlight');const a=e.dataTransfer.getData('text/plain');if(a){inp.value=a;saveData();flash(inp);}});inp.addEventListener('click',()=>{if(selectedChip){inp.value=selectedChip;saveData();flash(inp);document.querySelectorAll('.address-chip.selected').forEach(c=>c.classList.remove('selected'));selectedChip=null;}});});}
function hlDrop(on){document.querySelectorAll('.address-input').forEach(i=>{if(on)i.classList.add('drop-highlight');else i.classList.remove('drop-highlight');});}
function flash(inp){inp.style.transition='background 0.3s';inp.style.background='#d5f5e3';setTimeout(()=>inp.style.background='',800);}
function saveData(){localStorage.setItem('sales_route_v10',JSON.stringify({start:document.getElementById('start-point').value,end:document.getElementById('end-point').value,waypoints:Array.from(document.querySelectorAll('.waypoint-input')).map(i=>i.value),mode:document.getElementById('travel-mode').value,highways:document.getElementById('avoid-highways').checked,tolls:document.getElementById('avoid-tolls').checked}));}
function loadData(){let s=JSON.parse(localStorage.getItem('sales_route_v10')||"{}");if(!s.start&&!s.end){const o=JSON.parse(localStorage.getItem('sales_route_v9')||"{}");if(o.start||o.end)Object.assign(s,o);}document.getElementById('start-point').value=s.start||'';document.getElementById('end-point').value=s.end||'';document.getElementById('travel-mode').value=s.mode||'DRIVING';document.getElementById('avoid-highways').checked=s.highways||false;document.getElementById('avoid-tolls').checked=s.tolls||false;if(s.waypoints&&s.waypoints.length)s.waypoints.forEach(v=>addWP(v));else addWP();}
</script>
